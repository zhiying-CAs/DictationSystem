<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Word Detective 🕵️</title>
<style>
/* === Kiosk / full-screen lockdown (for Jamf Single App Mode) === */
*{
  -webkit-user-select:none;   /* no text selection / long-press copy */
  user-select:none;
  -webkit-touch-callout:none; /* no long-press menu (copy/define/share) */
  -webkit-tap-highlight-color:transparent;
}
/* Inputs still need to be usable for typing (name search, PIN, etc.) */
input,textarea,select{
  -webkit-user-select:text;
  user-select:text;
}
/* Hide scrollbars everywhere but keep scrolling working */
*::-webkit-scrollbar{width:0;height:0;display:none;}
html,body{-ms-overflow-style:none;scrollbar-width:none;}
/* (scroll-blocking rules removed — scrolling must work normally on phones too) */

@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{
  --g1:#1E5C1E;--g2:#2D7D2D;--g3:#4A9A3A;--g4:#6AAF45;--g5:#8DC63F;--g6:#C5E8A0;--g7:#EAF7D8;
  --white:#FFFFFF;--text:#1A3A1A;--muted:#5A7A5A;--border:#C8E6B0;
  --shadow:0 8px 32px rgba(45,109,45,0.15);--radius:16px;
  --danger:#EF4444;--amber:#F59E0B;--amber-bg:#FEF3C7;--blue:#3B82F6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;height:100dvh;max-height:100dvh;font-family:'Nunito',sans-serif;background:var(--g7);color:var(--text);overflow:hidden;position:fixed;width:100%;top:0;left:0;}
body{display:flex;flex-direction:column;}
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;}
.blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.15;animation:float var(--dur) ease-in-out infinite alternate;}
.blob1{width:300px;height:300px;background:var(--g3);top:-60px;right:-60px;--dur:7s;}
.blob2{width:250px;height:250px;background:var(--g4);bottom:-50px;left:-50px;--dur:9s;}
@keyframes float{from{transform:translate(0,0);}to{transform:translate(15px,20px);}}

/* === UNIFIED TOPBAR === */
.u-topbar{position:relative;z-index:10;display:flex;align-items:flex-start;justify-content:space-between;padding:8px 14px 4px;flex-shrink:0;}
.u-logo{height:22px;object-fit:contain;}
.u-session{display:flex;flex-direction:column;align-items:flex-end;gap:0;}
.u-session-code{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:3px 10px;font-size:11px;font-weight:800;color:var(--g1);letter-spacing:1px;font-family:monospace;display:inline-block;}
.u-session-name{font-size:11px;font-weight:800;color:var(--muted);margin-top:3px;}
.u-exit-btn{margin-top:5px;font-size:11px;font-weight:800;color:var(--muted);background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:4px 12px;cursor:pointer;font-family:'Nunito',sans-serif;}
.u-exit-btn:active{transform:scale(0.95);}

.main{position:relative;z-index:1;flex:1;min-height:0;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;padding:6px 14px 10px;overflow:hidden;gap:8px;}
.info-bar{display:flex;align-items:center;justify-content:space-between;}
.badge-pill{background:linear-gradient(135deg,var(--g2),var(--g3));color:white;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;}
.q-progress{font-size:13px;font-weight:800;color:var(--muted);}

/* Progress bar */
.prog-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g3),var(--g5));border-radius:4px;transition:width 0.4s;}

.passage-card{background:linear-gradient(145deg,#FFFDF5,#FEF9E7);border:2px solid var(--amber);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);flex-shrink:0;}
.passage-label{font-size:11px;font-weight:800;color:var(--amber);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.passage-text{font-size:16px;font-weight:600;color:var(--text);line-height:1.7;}
.passage-read-btn{margin-top:10px;display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:12px;background:linear-gradient(135deg,var(--g2),var(--g4));border:none;color:white;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.passage-read-btn:active{transform:scale(0.95);}
.passage-read-btn.playing{animation:speakPulse 0.8s ease infinite;}
.passage-controls{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.highlight-toggle-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:12px;background:var(--white);border:1.5px solid var(--amber);color:var(--amber);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:all 0.15s;}
.highlight-toggle-btn.active{background:var(--amber);color:white;}
.highlight-toggle-btn:active{transform:scale(0.95);}
.word-span{transition:background 0.15s,color 0.15s;border-radius:4px;padding:0 1px;}
.word-span.reading{background:var(--amber);color:white;}
@keyframes speakPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}

/* Question card */
.q-area{display:flex;flex-direction:column;min-height:0;overflow-y:auto;gap:12px;padding:2px;}
.q-card{background:var(--white);border:2px solid var(--border);border-radius:18px;padding:20px;box-shadow:var(--shadow);flex-shrink:0;}
.q-num-label{font-size:11px;font-weight:800;color:var(--g3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.q-text{font-size:19px;font-weight:800;color:var(--text);line-height:1.5;}
.q-word-hint{display:inline-block;margin-top:8px;font-size:13px;font-weight:700;color:var(--g2);background:var(--g7);padding:4px 12px;border-radius:12px;border:1.5px solid var(--g6);}

/* Options */
.options{display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.option{display:flex;align-items:center;gap:12px;padding:15px 16px;border:2px solid var(--border);border-radius:14px;background:var(--white);cursor:pointer;transition:all 0.15s;text-align:left;}
.option:active{transform:scale(0.98);}
.option-letter{width:30px;height:30px;border-radius:50%;background:var(--g7);border:1.5px solid var(--g4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--g2);flex-shrink:0;}
.option-text{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;}
.option.selected{border-color:var(--blue);background:#EFF6FF;}
.option.selected .option-letter{background:var(--blue);color:white;border-color:var(--blue);}
.option.correct{border-color:var(--g4);background:var(--g6);}
.option.correct .option-letter{background:var(--g3);color:white;border-color:var(--g3);}
.option.wrong{border-color:var(--danger);background:#FEE2E2;}
.option.wrong .option-letter{background:var(--danger);color:white;border-color:var(--danger);}
.option.disabled{pointer-events:none;}

/* Bottom action */
.q-action{flex-shrink:0;}
.next-btn{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--g2),var(--g3));color:white;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(45,125,45,0.3);transition:all 0.15s;}
.next-btn:active{transform:scale(0.98);}
.next-btn:disabled{opacity:0.4;box-shadow:none;}

/* RESULT */
.result-overlay{position:fixed;inset:0;background:rgba(234,247,216,0.97);z-index:150;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 20px;text-align:center;overflow-y:auto;}
.lock-overlay{position:fixed;inset:0;background:rgba(20,40,20,0.92);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;gap:14px;}
.lock-overlay.show{display:flex;}
.lock-emoji{font-size:56px;}
.lock-title{font-size:20px;font-weight:900;color:white;}
.lock-sub{font-size:14px;font-weight:600;color:#C8E6C9;}
.lock-timer{font-size:64px;font-weight:900;color:#FFD54F;letter-spacing:2px;font-variant-numeric:tabular-nums;}
.lock-unlock{background:white;border-radius:18px;padding:20px;width:100%;max-width:380px;margin-top:10px;}
.lock-q-label{font-size:13px;font-weight:800;color:var(--g2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.lock-q-mean{font-size:24px;font-weight:900;color:var(--g1);margin-bottom:14px;}
.lock-q-options{display:flex;flex-direction:column;gap:8px;}
.lock-q-opt{padding:14px;border:2px solid var(--border);border-radius:12px;background:var(--g7);font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--g1);cursor:pointer;}
.lock-q-opt:active{transform:scale(0.98);}
.lock-q-opt.wrong{border-color:var(--danger);background:#FEE2E2;}
.result-overlay.show{display:flex;}
.result-emoji{font-size:60px;margin:20px 0 10px;animation:bounce 0.6s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.result-title{font-size:25px;font-weight:900;color:var(--g1);margin-bottom:4px;}
.result-score{font-size:18px;font-weight:800;color:var(--muted);margin-bottom:8px;}
.result-pct{font-size:14px;font-weight:700;color:var(--g3);margin-bottom:16px;}
/* Word ID summary for teacher */
.wordid-summary{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px;max-width:440px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:10px;}
.wordid-chip{font-size:11px;font-weight:800;font-family:monospace;padding:3px 8px;border-radius:8px;letter-spacing:0.5px;}
.wordid-chip.ok{background:var(--g6);color:var(--g1);}
.wordid-chip.no{background:#FEE2E2;color:#991B1B;}
/* Explanation review */
.explain-lang-bar{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;width:100%;max-width:440px;}
.explain-lang-chip{padding:5px 12px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;}
.explain-lang-chip.active{border-color:var(--g3);background:var(--g6);color:var(--g1);}
.review-list{width:100%;max-width:440px;display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.review-item{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px;text-align:left;}
.wrong-header{background:#FEE2E2;border:1.5px solid var(--danger);border-radius:14px;padding:14px;font-size:16px;font-weight:900;color:#991B1B;text-align:center;margin-bottom:6px;line-height:1.5;}
.wrong-header-zh{font-size:14px;font-weight:700;color:#B91C1C;}
.wrong-opts{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.wrong-opt{padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;color:var(--text);background:var(--g7);}
.wrong-opt.picked{border-color:var(--danger);background:#FEE2E2;color:#991B1B;font-weight:800;}
.review-item.correct{border-left:5px solid var(--g4);}
.review-item.wrong{border-left:5px solid var(--danger);}
.review-q{font-size:14px;font-weight:800;color:var(--text);margin-bottom:6px;}
.review-status{font-size:12px;font-weight:800;margin-bottom:6px;}
.review-status.correct{color:var(--g2);}
.review-status.wrong{color:var(--danger);}
.review-answer{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:3px;}
.review-answer b{color:var(--g1);}
.review-explain{font-size:13px;font-weight:600;color:var(--text);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);line-height:1.5;}
.review-explain-lang{font-size:13px;color:var(--g2);margin-top:4px;font-weight:700;}
.raise-hand-btn{margin-top:10px;width:100%;padding:9px;border:1.5px solid var(--amber);border-radius:10px;background:var(--amber-bg);color:#92400E;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all 0.15s;}
.raise-hand-btn:active{transform:scale(0.97);}
.raise-hand-btn.raised{background:var(--g6);border-color:var(--g4);color:var(--g1);cursor:default;}
.result-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px;padding-bottom:20px;}
.result-btns button{padding:14px;border:none;border-radius:13px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.btn-next{background:linear-gradient(135deg,var(--g2),var(--g3));color:white;}
.btn-stop{background:var(--g7);color:var(--muted);border:1.5px solid var(--border);}
.btn-redo{background:var(--amber-bg);color:#92400E;border:1.5px solid var(--amber);}

/* CONFETTI */
.confetti-wrap{position:fixed;inset:0;z-index:200;pointer-events:none;}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;border-radius:2px;animation:confettiFall var(--dur) var(--delay) ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(234,247,216,0.92);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.overlay.show{display:flex;}
.spinner{width:44px;height:44px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--g2);animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.overlay-text{font-size:15px;font-weight:800;color:var(--g1);}

/* === UNIFIED EXIT MODAL === */
.u-exit-choice{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:250;display:none;align-items:center;justify-content:center;padding:24px;}
.u-exit-choice.show{display:flex;}
.u-exit-box{background:var(--white);border-radius:20px;padding:24px;width:100%;max-width:360px;text-align:center;}
.u-exit-box h3{font-size:19px;font-weight:900;color:var(--g1);margin-bottom:6px;}
.u-exit-box p{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:18px;}
.u-exit-btns{display:flex;flex-direction:column;gap:10px;}
.u-exit-btns button{padding:14px;border:none;border-radius:13px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.u-btn-continue{background:linear-gradient(135deg,var(--g2),var(--g3));color:white;}
.u-btn-home{background:var(--amber-bg);color:#92400E;border:1.5px solid var(--amber);}
.u-btn-cancel{background:var(--g7);color:var(--muted);border:1.5px solid var(--border);}
.u-pin-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;font-size:18px;font-weight:800;letter-spacing:4px;text-align:center;outline:none;margin-bottom:12px;font-family:'Nunito',sans-serif;}
.u-pin-err{font-size:12px;color:var(--danger);font-weight:700;margin-bottom:8px;display:none;}
.u-pin-err.show{display:block;}
</style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob1"></div><div class="blob blob2"></div></div>
<div class="confetti-wrap" id="confettiWrap"></div>
<div class="overlay" id="overlay"><div class="spinner"></div><div class="overlay-text" id="overlayText">Setting up Word Detective...</div></div>

<!-- Exit modal -->
<div class="u-exit-choice" id="uExitChoice">
  <div class="u-exit-box">
    <h3>🔐 Teacher PIN</h3>
    <p>Enter PIN to pause or exit this task.</p>
    <div class="u-pin-err" id="uPinErr">Wrong PIN. Try again.</div>
    <input type="password" class="u-pin-input" id="uExitPin" placeholder="••••••" maxlength="10" onkeydown="if(event.key==='Enter')uVerifyPin()">
    <div class="u-exit-btns" id="uPinBtns">
      <button class="u-btn-continue" onclick="uVerifyPin()">Unlock 🔓</button>
      <button class="u-btn-cancel" onclick="uCloseExit()">Cancel</button>
    </div>
    <div class="u-exit-btns" id="uChoiceBtns" style="display:none">
      <button class="u-btn-continue" onclick="uCloseExit()">▶️ Continue this task</button>
      <button class="u-btn-home" onclick="uPauseExit()">🏠 Pause & go to home</button>
    </div>
  </div>
</div>

<!-- Result -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div class="result-title" id="resultTitle">Well done!</div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-pct" id="resultPct"></div>
  <div class="wordid-summary" id="wordidSummary"></div>
  <div class="explain-lang-bar" id="explainLangBar"></div>
  <div class="review-list" id="reviewList"></div>
  <div class="result-btns" id="resultBtns"></div>
</div>

<!-- Cooldown / unlock lock-screen (anti-rushing) -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-emoji">⏳</div>
  <div class="lock-title" id="lockTitle">Take a break and read your words!</div>
  <div class="lock-sub" id="lockSub">You can try again after the timer.</div>
  <div class="lock-timer" id="lockTimer">10:00</div>
  <div class="lock-unlock" id="lockUnlock" style="display:none">
    <div class="lock-q-label">Answer this to unlock 🔑</div>
    <div class="lock-q-mean" id="lockQMean">—</div>
    <div class="lock-q-options" id="lockQOptions"></div>
  </div>
</div>

<div class="u-topbar">
  <img src="ZPS_header.png" alt="ZPS" class="u-logo" onerror="this.style.display='none'">
  <div class="u-session">
    <div class="u-session-code" id="sessionCode">—</div>
    <div class="u-session-name" id="uSessionName">—</div>
    <button class="u-exit-btn" onclick="uOpenExit()">Exit 🔐</button>
  </div>
</div>

<div class="main">
  <div class="info-bar">
    <div class="badge-pill">🕵️ Word Detective</div>
    <div class="q-progress" id="qProgress">1 / 12</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="q-area" id="qArea">
    <div class="passage-card" id="passageCard">
      <div class="passage-label">📖 Read the passage</div>
      <div class="passage-text" id="passageText">—</div>
      <div class="passage-controls">
        <button class="passage-read-btn" id="passageReadBtn" onclick="readPassage()">🔊 Read aloud</button>
        <button class="highlight-toggle-btn active" id="highlightToggleBtn" style="display:none" onclick="toggleHighlight()">🔆 Highlighting on</button>
      </div>
    </div>
    <div class="q-card">
      <div class="q-num-label" id="qNumLabel">Question 1</div>
      <div class="q-text" id="qText">—</div>
    </div>
    <div class="options" id="options"></div>
  </div>

  <div class="q-action">
    <button class="next-btn" id="nextBtn" onclick="onNext()" disabled>Select an answer</button>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbw76QSB-lv4pA-6s_m6vNk_oGEdeLqrsqkoBGu6j-XMulb-maiAGkqqhfqqEmGfcbn3Ow/exec';
const LANG_LABELS={en:'English',zh:'中文',ms:'Malay',id:'Indonesia',vi:'Việt',th:'ไทย',my:'မြန်မာ',km:'ខ្មែរ',bn:'বাংলা'};
const LANG_KEY={zh:'translation_zh',ms:'translation_ms',id:'translation_id',vi:'translation_vi',th:'translation_th',my:'translation_my',km:'translation_km',bn:'translation_bn'};

let config={},setup={},student={},recordId='';
let COOLDOWN_MS=10*60*1000, cooldownTimer=null;
let questions=[];
let highlightOn = true;       // default ON (student can turn off)
let highlightTimer = null;
let highlightWords = [];      // array of word span elements for current passage
let highlightRAF=null;
let highlightAudio=null;
let currentQ=0,score=0;
let answers=[]; // {word, picked, correct, isCorrect, q}
let selectedOption=null,answered=false;
let explainLang='en';
window.recordId='';

async function api(p, keepalive){const q=new URLSearchParams(p).toString();const r=await fetch(API+'?'+q, keepalive?{keepalive:true}:undefined);return r.json();}
function showLoading(t){document.getElementById('overlayText').textContent=t||'...';document.getElementById('overlay').classList.add('show');}
function hideLoading(){document.getElementById('overlay').classList.remove('show');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ===== Audio =====
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(freq,dur,type='square',vol=0.15,delay=0){try{const c=getCtx();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,c.currentTime+delay);g.gain.linearRampToValueAtTime(vol,c.currentTime+delay+0.01);g.gain.linearRampToValueAtTime(0,c.currentTime+delay+dur);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur+0.05);}catch(e){}}
function sndCorrect(){tone(523,0.1,'square',0.13,0);tone(659,0.1,'square',0.13,0.1);tone(784,0.15,'square',0.13,0.2);}

  // Use SAME rows as Task 3 (connectivity). Read from sessionStorage.
  let sessionWords=[];
  const stored=sessionStorage.getItem('ds_session_words');
  if(stored){try{sessionWords=JSON.parse(stored);}catch(e){sessionWords=[];}}

  // Fallback: if Task 3/4 haven't run yet (e.g. task order is 1-5-...), select word partners

  if(!sessionWords.length){

    if(t1){try{task1Words=JSON.parse(t1);}catch(e){task1Words=[];}}

    let allRows=[];
    if(task1Ids.length){

        const res=await api({action:'getWords',series:setup.series,level:setup.level,
          unit_from:setup.unit_from,unit_to:setup.unit_to,half:'all',mode:'all'});
        if(res.success)allRows=res.data;
      }catch(e){}
    }

    const task1WordSet=new Set(task1Words.map(w=>String(w.word).toLowerCase().trim()));
    const eligibleRows=allRows.filter(r=>
      r.collocations && r.collocations.trim() &&
      task1WordSet.has(String(r.word).toLowerCase().trim())
    );

    const byWord={};
    eligibleRows.forEach(w=>{
      const key=String(w.word).toLowerCase().trim();
      if(!byWord[key])byWord[key]=[];
      byWord[key].push(w);
    });
    const uniqueWordPartners=Object.values(byWord).map(rows=>rows[Math.floor(Math.random()*rows.length)]);
    shuffle(uniqueWordPartners);
    const numC=parseInt(setup.task3_collocations)||12;
    sessionWords=uniqueWordPartners.slice(0,Math.min(numC,uniqueWordPartners.length));

    if(sessionWords.length){
      // Save so Task 3 / Task 4 (whichever runs later) use the SAME word partners
      sessionStorage.setItem('ds_session_word_ids', sessionWords.map(w=>w.word_id).join(','));
      sessionStorage.setItem('ds_session_words', JSON.stringify(sessionWords));
      api({action:'updateRecord',record_id:recordId,words_tested:sessionWords.map(w=>w.word_id).join(','),status:'word_detective_started'});
    }
  }

  // Build questions from rows that have passage + qns + synonym options
  questions=sessionWords.filter(w=>w.short_passage&&w.short_passage.trim()&&w.qns&&w.qns.trim()).map(w=>{
    const opts=[
      {text:w.synonyms_correct,correct:true},
      {text:w.synonyms_wrong1,correct:false},
      {text:w.synonyms_wrong2,correct:false}
    ].filter(o=>o.text&&o.text.trim());
    shuffle(opts);
    return {word:w,passage:w.short_passage,question:w.qns,options:opts};
  });
  shuffle(questions);  // randomise question order each attempt (anti-cheat)

  if(!questions.length){
    alert('No passages found for these words. Please check the sheet (Short Passage, Qns columns).');
    window.location.href='setup.html';return;
  }

  // Pool for the anti-rushing unlock question
  window.sessionWordsForUnlock = sessionWords.filter(w=>w.collocations&&w.collocations.trim());

  // Resume an active cooldown if there is one
  const cd=parseInt(sessionStorage.getItem('ds_t5_cooldown_until')||'0');
  if(cd && Date.now()<cd){ showCooldown(); return; }
  if(cd && Date.now()>=cd){ document.getElementById('lockOverlay').classList.add('show'); showUnlockQuestion(); return; }

  api({action:'updateRecord',record_id:recordId,status:'word_detective_started'});
  showQuestion(0);
  hideLoading();
  document.addEventListener('touchstart',()=>{try{getCtx().resume();}catch(e){}},{once:true});
})();

// ===== Read-aloud word highlighting =====
function renderPassageWords(text){
  const el = document.getElementById('passageText');
  el.innerHTML = '';
  highlightWords = [];
  // Split on whitespace but keep it, so spacing/punctuation stays natural
  const tokens = text.split(/(\s+)/);
  tokens.forEach(tok=>{
    if(tok.trim()===''){
      el.appendChild(document.createTextNode(tok));
    } else {
      const span = document.createElement('span');
      span.className = 'word-span';
      span.textContent = tok;
      el.appendChild(span);
      highlightWords.push(span);
    }
  });
}

function toggleHighlight(){
  highlightOn = !highlightOn;
  const btn = document.getElementById('highlightToggleBtn');
  btn.classList.toggle('active', highlightOn);
  btn.textContent = highlightOn ? '🔆 Highlighting on' : '🔆 Highlighting off';
  if(!highlightOn) stopHighlight();
}

function stopHighlight(){
  if(highlightTimer){ clearInterval(highlightTimer); highlightTimer=null; }
  if(highlightRAF){ cancelAnimationFrame(highlightRAF); highlightRAF=null; }
  highlightAudio=null;
  highlightWords.forEach(w=>w.classList.remove('reading'));
}

// Highlight driven by the audio's playback position.
// knownDur (computed exactly from PCM length) is the most reliable; we use the audio's
// real currentTime against it so highlighting tracks the voice precisely.
function startHighlightFromAudio(audio, knownDur){
  stopHighlight();
  if(!highlightOn || !highlightWords.length) return;
  highlightAudio = audio;
  const n = highlightWords.length;

  // Best available total duration: the exact computed one, else audio.duration, else estimate
  let total = (knownDur && knownDur>0) ? knownDur
            : (isFinite(audio.duration) && audio.duration>0) ? audio.duration
            : n / (165/60);
  const startedAt = performance.now();

  function tick(){
    if(!highlightAudio || highlightAudio.paused || highlightAudio.ended){ return; }
    // Prefer the audio's real currentTime; fall back to wall-clock if it's stuck at 0
    let elapsed = highlightAudio.currentTime;
    if(!(elapsed>0)) elapsed = (performance.now()-startedAt)/1000;
    let frac = Math.max(0, Math.min(0.999, elapsed/total));
    const idx = Math.floor(frac * n);
    highlightWords.forEach((w,k)=>w.classList.toggle('reading', k===idx));
    highlightRAF = requestAnimationFrame(tick);
  }
  highlightRAF = requestAnimationFrame(tick);
}

// Timer-based fallback (for Web Speech API, which has no currentTime)
function startHighlightTimed(totalSeconds){
  stopHighlight();
  if(!highlightOn || !highlightWords.length) return;
  const perWord = (totalSeconds && totalSeconds>0)
    ? (totalSeconds*1000) / highlightWords.length
    : 350;
  let i = 0;
  highlightWords[0].classList.add('reading');
  highlightTimer = setInterval(()=>{
    highlightWords[i].classList.remove('reading');
    i++;
    if(i>=highlightWords.length){ stopHighlight(); return; }
    highlightWords[i].classList.add('reading');
  }, perWord);
}

// Read passage aloud (cached TTS)
const passageAudioCache={};
const passageAudioDur={};   // exact audio duration (seconds) per passage text
async function readPassage(){
  const q=questions[currentQ];
  const text=q.passage;
  const btn=document.getElementById('passageReadBtn');
  btn.classList.add('playing');
  // Reveal the highlight toggle now that the student is listening
  document.getElementById('highlightToggleBtn').style.display='inline-flex';
  try{
    let url=passageAudioCache[text];
    if(!url){
      const key=config.gemini_api_key||'';
      const voice=config.gemini_voice||'Zephyr';
      if(key){
        const prompt=`You are a warm, friendly primary school English teacher reading a short story aloud to young learners. Read the following passage clearly, slowly, and expressively, with gentle human warmth and natural storytelling rhythm — pause naturally at commas and full stops, the way a caring teacher reads to children during story time. Read only the passage: "${text}"`;
        const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{responseModalities:['AUDIO'],speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:voice}}}}})});
        const data=await resp.json();
        const b64=data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
        if(b64){
          const bin=atob(b64);const bytes=new Uint8Array(bin.length);
          for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
          const wav=pcmToWav(bytes,24000,1,16);
          url=URL.createObjectURL(new Blob([wav],{type:'audio/wav'}));
          passageAudioCache[text]=url;
          // Exact duration = samples / sampleRate. bytes = 16-bit mono PCM.
          passageAudioDur[text] = (bytes.length/2) / 24000;
        }
      }
    }
    if(url){
      const a=new Audio(url);
      // We KNOW the exact duration from the PCM length (24000 Hz, 16-bit mono):
      // seconds = numSamples / sampleRate = (byteLength/2) / 24000.
      // This is far more reliable than audio.duration (which is often Infinity for WAV blobs).
      const knownDur = passageAudioDur[text] || 0;
      let started=false;
      const begin=()=>{ if(!started){ started=true; startHighlightFromAudio(a, knownDur); } };
      a.onplay=begin;
      a.onplaying=begin;
      a.onended=()=>{btn.classList.remove('playing');stopHighlight();};
      await a.play();
      // Safety net: if neither event fired shortly after play, start anyway
      setTimeout(()=>{ if(!started && !a.paused) begin(); }, 250);
    }
    else{webSpeakPassage(text,btn);}
  }catch(e){webSpeakPassage(text,btn);}
}
function webSpeakPassage(text,btn){
  if(!window.speechSynthesis){ btn.classList.remove('playing'); return; }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='en-GB';u.rate=0.9;
  // NOTE: onboundary is unreliable on mobile (property exists but never fires on
  // iOS Safari / many Android browsers), so we ALWAYS drive highlight off a timer here.
  const wordCount = highlightWords.length || text.split(/\s+/).length;
  const estSeconds = wordCount / (150*0.9/60);
  startHighlightTimed(estSeconds);
  u.onend=()=>{btn.classList.remove('playing');stopHighlight();};
  u.onerror=()=>{btn.classList.remove('playing');stopHighlight();};
  speechSynthesis.speak(u);
}
function pcmToWav(pcm,sr,ch,bps){const dl=pcm.length;const ba=ch*bps/8;const br=sr*ba;const buf=new ArrayBuffer(44+dl);const v=new DataView(buf);const s=(o,str)=>{for(let i=0;i<str.length;i++)v.setUint8(o+i,str.charCodeAt(i));};s(0,'RIFF');v.setUint32(4,36+dl,true);s(8,'WAVE');s(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,br,true);v.setUint16(32,ba,true);v.setUint16(34,bps,true);s(36,'data');v.setUint32(40,dl,true);new Uint8Array(buf).set(pcm,44);return buf;}

function selectOption(i,el){
  if(answered)return;
  selectedOption=i;
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  const btn=document.getElementById('nextBtn');
  btn.disabled=false;
  btn.textContent=(currentQ===questions.length-1)?'See results ➜':'Next question ➜';
}

function onNext(){
  if(selectedOption===null)return;
  // Record the answer silently (no reveal). Show correct/wrong only at the end.
  const q=questions[currentQ];
  const isCorrect=q.options[selectedOption].correct;
  if(isCorrect)score++;
  answers.push({word:q.word,question:q.question,
    picked:q.options[selectedOption].text,
    correct:q.options.find(o=>o.correct).text,
    options:q.options.map(o=>o.text),
    isCorrect});
  // Move on
  if(currentQ<questions.length-1){showQuestion(currentQ+1);}
  else showResult();
}

// ===== RESULT =====
function showResult(){
  const total=questions.length;
  const pct=Math.round(score/total*100);
  // Pass mark: from teacher setting (auto=75%, a number=that many correct, 0=no limit)
  let passScore;
  const pm = setup.pass_mark || 'auto';
  if(pm==='auto'){ passScore=Math.ceil(total*0.75); }
  else if(pm==='0'||pm===0){ passScore=0; }
  else { passScore=Math.min(parseInt(pm), total); } // never require more than total
  const passed=score>=passScore;

  const t5Attempts = passed ? (parseInt(sessionStorage.getItem('ds_t5_fails')||'0')+1) : undefined;
  api({action:'updateRecord',record_id:recordId,
    score:score+'/'+total,
    wrong_words:answers.filter(a=>!a.isCorrect).map(a=>a.word.word_id).join(','),
    task5_results:answers.map(a=>a.word.word_id+':'+(a.isCorrect?'1':'0')).join(' '),
    ...(passed?{task5_attempts:t5Attempts}:{}),
    status:passed?'word_detective_done':'word_detective_failed'}, true);

  const ov=document.getElementById('resultOverlay');ov.classList.add('show');
  document.getElementById('resultEmoji').textContent=passed?'🎉':'💪';
  document.getElementById('resultTitle').textContent=passed?'Brilliant detective work! 🔍':'Good try, detective! Try again to pass.';
  document.getElementById('resultPct').textContent=passed?`${pct}% correct`:'';

  if(passed){
    sndWin();bigConfetti();
    document.getElementById('resultScore').textContent=`Score: ${score} / ${total}`;
    buildExplainLangBar();
    renderWordIdSummary();
    renderReview();
  } else {
    // Not passed → show ONLY wrong questions, mark the student's wrong pick, hide the correct answer.
    document.getElementById('resultScore').textContent='';
    const lb=document.getElementById('explainLangBar'); if(lb) lb.innerHTML='';
    const ws=document.getElementById('wordidSummary'); if(ws) ws.innerHTML='';
    renderWrongOnly();
  }

  const btns=document.getElementById('resultBtns');btns.innerHTML='';
  if(passed){
    const next=document.createElement('button');next.className='btn-next';
    next.textContent=hasNextTask()?'Next task ➜':'Finish 🎉';
    next.onclick=goNext;btns.appendChild(next);
    sessionStorage.removeItem('ds_t5_fails');  // reset on success
  } else {
    let fails=parseInt(sessionStorage.getItem('ds_t5_fails')||'0')+1;
    sessionStorage.setItem('ds_t5_fails', String(fails));
    const redo=document.createElement('button');redo.className='btn-redo';redo.textContent='Try again 🔄';
    if(fails>=2){ redo.onclick=()=>startCooldown(); }  // 2nd fail onwards → wait + unlock Q
    else { redo.onclick=()=>location.reload(); }        // 1st fail → free retry
    btns.appendChild(redo);
  }
  const stop=document.createElement('button');stop.className='btn-stop';stop.textContent='Stop here';stop.onclick=uOpenExit;btns.appendChild(stop);
}

// Wait grows with fails: 2nd=2.5min, 3rd=5min, 4th=7.5min, 5th+=10min
function cooldownMsForFails(fails){
  if(fails>=6) return 10*60*1000;
  if(fails===5) return 8*60*1000;
  if(fails===4) return 6*60*1000;
  if(fails===3) return 4*60*1000;
  return 2*60*1000; // 2nd fail
}

// ===== Anti-rushing cooldown + unlock question (3rd fail onwards) =====
// (COOLDOWN_MS & cooldownTimer declared at top)
function startCooldown(){
  document.getElementById('resultOverlay').classList.remove('show');
  const fails=parseInt(sessionStorage.getItem('ds_t5_fails')||'0');
  const until = Date.now()+cooldownMsForFails(fails);
  sessionStorage.setItem('ds_t5_cooldown_until', String(until));
  showCooldown();
}
function showCooldown(){
  const until=parseInt(sessionStorage.getItem('ds_t5_cooldown_until')||'0');
  const lock=document.getElementById('lockOverlay');
  lock.classList.add('show');
  document.getElementById('lockUnlock').style.display='none';
  document.getElementById('lockTitle').textContent='Take a break and read your words!';
  document.getElementById('lockSub').textContent='You can try again after the timer.';
  if(cooldownTimer)clearInterval(cooldownTimer);
  const tick=()=>{
    const left=until-Date.now();
    if(left<=0){
      clearInterval(cooldownTimer);
      document.getElementById('lockTimer').textContent='0:00';
      showUnlockQuestion();
      return;
    }
    const m=Math.floor(left/60000), s=Math.floor((left%60000)/1000);
    document.getElementById('lockTimer').textContent=m+':'+String(s).padStart(2,'0');
  };
  tick();
  cooldownTimer=setInterval(tick,500);
}
// Timer finished → just let them start again (no unlock question, pure wait)
function cooldownDone(){
  document.getElementById('lockTimer').textContent='✅';
  document.getElementById('lockTitle').textContent='Time is up!';
  document.getElementById('lockSub').textContent='You can try again now.';
  const box=document.getElementById('lockUnlock');box.style.display='block';
  box.innerHTML='';
  const btn=document.createElement('button');btn.className='lock-q-opt';btn.textContent='Start again ▶';
  btn.onclick=()=>{ sessionStorage.removeItem('ds_t5_cooldown_until'); location.reload(); };
  box.appendChild(btn);
}
function showUnlockQuestion(){
  const pool=(window.sessionWordsForUnlock||[]).filter(w=>w.collocations&&w.collocations.trim());
  document.getElementById('lockTimer').textContent='✅';
  document.getElementById('lockTitle').textContent='Time is up!';
  document.getElementById('lockSub').textContent='Answer correctly to start again.';
  const box=document.getElementById('lockUnlock');box.style.display='block';
  if(!pool.length){
    box.innerHTML='';
    const btn=document.createElement('button');btn.className='lock-q-opt';btn.textContent='Start again ▶';
    btn.onclick=()=>{ sessionStorage.removeItem('ds_t5_cooldown_until'); location.reload(); };
    box.appendChild(btn);
    return;
  }
  const target=pool[Math.floor(Math.random()*pool.length)];
  const correct=target.collocations.trim();
  const dm=sessionStorage.getItem('ds_display_mode')||'el';
  const CK={zh:'collocation_zh',ms:'collocation_ms',id:'collocation_id',vi:'collocation_vi',th:'collocation_th',my:'collocation_my',km:'collocation_km',bn:'collocation_bn'};
  let mean='';
  if(dm!=='el'&&CK[dm]) mean=(target[CK[dm]]||'').trim();
  if(!mean) mean=(target.collocation_meaning||'').trim()||correct;
  document.getElementById('lockQMean').textContent=mean;
  const opts=[correct];
  const others=pool.filter(w=>w.word_id!==target.word_id&&w.collocations);
  shuffle(others);
  for(const w of others){ if(opts.length>=3)break; const c=w.collocations.trim(); if(!opts.includes(c))opts.push(c); }
  shuffle(opts);
  const cont=document.getElementById('lockQOptions');cont.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');btn.className='lock-q-opt';btn.textContent=o;
    btn.onclick=()=>{
      if(o===correct){
        sndCorrect&&sndCorrect();
        sessionStorage.removeItem('ds_t5_cooldown_until');  // keep fail count
        location.reload();
      } else { sndWrong&&sndWrong(); btn.classList.add('wrong'); setTimeout(()=>startCooldown(),600); }
    };
    cont.appendChild(btn);
  });
}

// Check whether any enabled task comes after this one in the configured order
function hasNextTask(){
  const taskDefs=[{page:'task1.html'},{page:'task2.html'},{page:'task3.html'},{page:'task4.html'},null];
  const order=setup.task_order||[0,1,2,3,4];
  const enabled=setup.task_enabled||[true,true,true,true,true];
  const t5pos=order.indexOf(4);
  for(let i=t5pos+1;i<order.length;i++){const idx=order[i];if(enabled[idx]&&taskDefs[idx]?.page)return true;}
  return false;
}

// Show ONLY wrong questions, mark the student's wrong pick, correct answer HIDDEN.
function renderWrongOnly(){
  const list=document.getElementById('reviewList');list.innerHTML='';
  const wrong=answers.filter(a=>!a.isCorrect);
  const header=document.createElement('div');
  header.className='wrong-header';
  header.innerHTML='❌ These are the questions you got wrong.<br><span class="wrong-header-zh">这些是你做错的题目。再试一次！</span>';
  list.appendChild(header);
  wrong.forEach((a,i)=>{
    const item=document.createElement('div');
    item.className='review-item wrong';
    let html=`<div class="review-q">${i+1}. ${a.question}</div>`;
    html+='<div class="wrong-opts">';
    (a.options||[]).forEach(opt=>{
      const isPicked = opt===a.picked;
      html+=`<div class="wrong-opt${isPicked?' picked':''}">${isPicked?'👉 ':''}${opt}${isPicked?' ❌':''}</div>`;
    });
    html+='</div>';
    item.innerHTML=html;
    list.appendChild(item);
  });
  if(!wrong.length){ list.innerHTML=''; }
}

function renderReview(){
  const list=document.getElementById('reviewList');list.innerHTML='';
  answers.forEach((a,i)=>{
    const item=document.createElement('div');
    item.className='review-item '+(a.isCorrect?'correct':'wrong');
    let html=`<div class="review-q">Q${i+1}. ${a.question}</div>`;
    html+=`<div class="review-status ${a.isCorrect?'correct':'wrong'}">${a.isCorrect?'✓ Correct':'✗ Incorrect'}</div>`;
    if(!a.isCorrect){
      html+=`<div class="review-answer">Your answer: ${a.picked}</div>`;
      html+=`<div class="review-answer">Correct answer: <b>${a.correct}</b></div>`;
    } else {
      html+=`<div class="review-answer">Answer: <b>${a.correct}</b></div>`;
    }
    // Explanation: use collocation meaning + the partner's OWN translation
    const w=a.word;
    const COLLOC_KEY={zh:'collocation_zh',ms:'collocation_ms',id:'collocation_id',vi:'collocation_vi',th:'collocation_th',my:'collocation_my',km:'collocation_km',bn:'collocation_bn'};
    let explain='';
    if(explainLang==='en'){
      explain=`"${w.collocations}" — ${w.collocation_meaning||w.definition_en||''}`;
    } else {
      const t=w[COLLOC_KEY[explainLang]]||'';
      explain=`"${w.collocations}"`;
      if(t)explain+=` — ${t}`;
      else explain+=` — ${w.collocation_meaning||''} (translation coming soon)`;
    }
    html+=`<div class="review-explain">💡 ${explain}</div>`;
    item.innerHTML=html;
    const rh=document.createElement('button');
    rh.className='raise-hand-btn';
    rh.dataset.qi=i;
    rh.innerHTML='🙋 Ask teacher';
    rh.onclick=()=>raiseHand(i,rh);
    item.appendChild(rh);
    list.appendChild(item);
  });
}

// ===== RAISE HAND =====
let raisedHands=new Set();
async function raiseHand(qi,btn){
  if(raisedHands.has(qi))return;
  raisedHands.add(qi);
  const a=answers[qi];
  btn.classList.add('raised');
  btn.innerHTML='✋ Teacher notified!';
  btn.disabled=true;
  try{
    await api({action:'saveHelpRequest',
      record_id:recordId,
      student_name:student.name||'',
      task:'Word Detective (Task 5)',
      word_or_question:'['+a.word.word_id+'] '+a.question,
      student_answer:a.picked,
      correct_answer:a.correct});
    await api({action:'updateRecord',record_id:recordId,raise_hand:'yes'});
  }catch(e){}
}

function bigConfetti(){const wrap=document.getElementById('confettiWrap');const colors=['#4A9A3A','#6AAF45','#F59E0B','#3B82F6','#EC4899','#8B5CF6'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};--dur:${1.5+Math.random()*2}s;--delay:${Math.random()*1.5}s;`;wrap.appendChild(p);}setTimeout(()=>wrap.innerHTML='',5000);}

function goNext(){
  const taskDefs=[{page:'task1.html'},{page:'task2.html'},{page:'task3.html'},{page:'task4.html'},null];
  const order=setup.task_order||[0,1,2,3,4];
  const enabled=setup.task_enabled||[true,true,true,true,true];
  const t5pos=order.indexOf(4);
  for(let i=t5pos+1;i<order.length;i++){const idx=order[i];if(enabled[idx]&&taskDefs[idx]?.page){window.location.href=taskDefs[idx].page;return;}}
  // This really is the last task — mark session complete and go home.
  try{const q=new URLSearchParams({action:'updateRecord',record_id:(window.recordId||recordId||''),status:'all_tasks_complete'}).toString();fetch(API+'?'+q);}catch(e){}
  window.location.href='index.html';
}

// ===== UNIFIED EXIT =====
function uOpenExit(){
  document.getElementById('uExitChoice').classList.add('show');
  document.getElementById('uExitPin').value='';
  document.getElementById('uPinErr').classList.remove('show');
  document.getElementById('uPinBtns').style.display='flex';
  document.getElementById('uChoiceBtns').style.display='none';
  document.getElementById('uExitPin').style.display='block';
  setTimeout(()=>document.getElementById('uExitPin').focus(),200);
}
function uCloseExit(){document.getElementById('uExitChoice').classList.remove('show');}
async function uVerifyPin(){
  const pin=document.getElementById('uExitPin').value.trim();if(!pin)return;
  try{
    const res=await api({action:'verifyPin',pin});
    if(res.verified){
      document.getElementById('uExitPin').style.display='none';
      document.getElementById('uPinBtns').style.display='none';
      document.getElementById('uChoiceBtns').style.display='flex';
      document.getElementById('uPinErr').classList.remove('show');
    }else{document.getElementById('uPinErr').classList.add('show');document.getElementById('uExitPin').value='';}
  }catch(e){document.getElementById('uPinErr').classList.add('show');}
}
async function uPauseExit(){
  try{const q=new URLSearchParams({action:'updateRecord',record_id:(window.recordId||''),status:'paused'}).toString();await fetch(API+'?'+q);}catch(e){}
  window.location.href='index.html';
}

history.pushState(null,'',location.href);
window.addEventListener('popstate',()=>history.pushState(null,'',location.href));
</script>
<script>
/* === GLOBAL CLICK SPROUT EFFECT 🌱 + sound === */
(function(){
  // Click sound via Web Audio (short pleasant pop)
  let _cax=null;
  function _ctx(){if(!_cax)_cax=new(window.AudioContext||window.webkitAudioContext)();return _cax;}
  function clickSound(){
    try{
      const c=_ctx();const o=c.createOscillator();const g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.setValueAtTime(680,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(1100,c.currentTime+0.06);
      g.gain.setValueAtTime(0.0001,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.08,c.currentTime+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.12);
      o.start(c.currentTime);o.stop(c.currentTime+0.14);
    }catch(e){}
  }
  // Sprout visual at click point
  function sprout(x,y){
    const s=document.createElement('div');
    s.textContent='🌱';
    s.style.cssText='position:fixed;left:'+x+'px;top:'+y+'px;font-size:28px;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);animation:sproutPop 0.6s ease-out forwards;';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),650);
  }
  // Inject keyframes once
  if(!document.getElementById('sproutKeyframes')){
    const st=document.createElement('style');st.id='sproutKeyframes';
    st.textContent='@keyframes sproutPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);}30%{opacity:1;transform:translate(-50%,-70%) scale(1.2);}100%{opacity:0;transform:translate(-50%,-130%) scale(0.9);}}';
    document.head.appendChild(st);
  }
  function handle(e){
    let x,y;
    if(e.touches&&e.touches[0]){x=e.touches[0].clientX;y=e.touches[0].clientY;}
    else if(e.changedTouches&&e.changedTouches[0]){x=e.changedTouches[0].clientX;y=e.changedTouches[0].clientY;}
    else{x=e.clientX;y=e.clientY;}
    if(x==null||y==null)return;
    sprout(x,y);clickSound();
  }
  // Use pointerdown for unified mouse+touch (fires once per interaction)
  document.addEventListener('pointerdown',handle,{passive:true});
})();
</script>
