<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Hunt 🔍</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root {
  --g1:#1E5C1E;--g2:#2D7D2D;--g3:#4A9A3A;--g4:#6AAF45;--g5:#8DC63F;--g6:#C5E8A0;--g7:#EAF7D8;
  --white:#FFFFFF;--text:#1A3A1A;--muted:#5A7A5A;--border:#C8E6B0;
  --shadow:0 8px 32px rgba(45,109,45,0.15);--radius:16px;
  --danger:#EF4444;--amber:#F59E0B;--amber-bg:#FEF3C7;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;max-height:100vh;font-family:'Nunito',sans-serif;background:var(--g7);color:var(--text);overflow:hidden;position:fixed;width:100%;}

/* ANIMATED BG */
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;}
.blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.15;animation:float var(--dur) ease-in-out infinite alternate;}
.blob1{width:300px;height:300px;background:var(--g3);top:-60px;right:-60px;--dur:7s;}
.blob2{width:250px;height:250px;background:var(--g4);bottom:-50px;left:-50px;--dur:9s;}
@keyframes float{from{transform:translate(0,0);}to{transform:translate(15px,20px);}}

/* IDLE SPARKLES */
.idle-effect{position:fixed;inset:0;z-index:50;pointer-events:none;display:none;}
.idle-effect.show{display:block;}
.sparkle{position:absolute;font-size:28px;animation:sparkleAnim 1.5s ease-out forwards;}
@keyframes sparkleAnim{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-80px) scale(1.5);}}
.idle-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:51;
  background:rgba(255,255,255,0.95);border:2px solid var(--amber);border-radius:20px;
  padding:16px 24px;text-align:center;font-size:16px;font-weight:800;color:#92400E;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);display:none;animation:blink 1s ease-in-out infinite;}
.idle-msg.show{display:block;}
@keyframes blink{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.04);}}

/* TOPBAR */
.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;flex-shrink:0;}
.logo-img{height:34px;object-fit:contain;}
.session-code{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:800;color:var(--g1);letter-spacing:1px;font-family:monospace;}

/* MAIN */
.main{position:relative;z-index:1;height:calc(100vh - 54px);display:flex;flex-direction:column;padding:4px 12px 6px;overflow:hidden;}

/* INFO BAR */
.info-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;flex-shrink:0;}
.badge-pill{background:linear-gradient(135deg,var(--g2),var(--g3));color:white;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;}
.score-display{font-size:13px;font-weight:800;color:var(--g2);}
.exit-btn{font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;}

/* HINT BAR */
.hint-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;flex-shrink:0;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:4px 10px;}
.hint-dots{display:flex;gap:5px;align-items:center;}
.hint-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--amber);background:var(--amber-bg);transition:all 0.3s;}
.hint-dot.used{background:#E5E7EB;border-color:#D1D5DB;}
.hint-btn{padding:5px 14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--amber),#F97316);color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all 0.18s;}
.hint-btn:hover{transform:scale(1.05);}
.hint-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.hint-label{font-size:12px;font-weight:700;color:var(--muted);}

/* PUZZLE TYPE LABEL */
.puzzle-label{text-align:center;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:2px;margin-top:0;letter-spacing:0.5px;flex-shrink:0;}

/* LANG BAR */


/* WORD SEARCH */
.ws-container{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;gap:0;}
.ws-grid-wrap{flex:1;display:flex;align-items:flex-start;justify-content:center;padding-top:2px;min-height:0;overflow:hidden;}
.ws-grid{display:inline-grid;gap:2px;border:2px solid var(--border);border-radius:12px;background:var(--white);padding:6px;box-shadow:var(--shadow);}
.ws-cell{display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:800;cursor:pointer;border:1.5px solid transparent;transition:all 0.1s;text-transform:uppercase;}
.ws-cell.selected{background:var(--amber-bg);border-color:var(--amber);color:#92400E;}
.ws-cell.found{background:var(--g6);border-color:var(--g4);color:var(--g1);}
.ws-cell.gifted{background:#DBEAFE;border-color:#3B82F6;color:#1D4ED8;}
.ws-cell.hint-flash{background:#FEF9C3;border-color:#EAB308;animation:hintFlash 0.6s ease 3;}
@keyframes hintFlash{0%,100%{background:#FEF9C3;}50%{background:#FDE047;}}
.ws-wordlist{flex:0 0 auto;height:88px;margin-top:4px;display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-start;overflow-y:auto;padding:4px 6px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;}
.ws-word-chip{padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);background:var(--white);font-size:13px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:0.5px;}
.ws-word-chip.found{background:var(--g6);border-color:var(--g4);color:var(--g1);text-decoration:line-through;}
.ws-word-chip.gifted{background:#DBEAFE;border-color:#3B82F6;color:#1D4ED8;}

/* CROSSWORD — vertical layout */
.cw-container{flex:1;display:flex;flex-direction:column;min-height:0;gap:6px;}
.cw-grid-wrap{flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:auto;max-height:52vh;}
.cw-grid{display:inline-grid;gap:2px;background:var(--white);border:2px solid var(--border);border-radius:12px;padding:6px;box-shadow:var(--shadow);}
.cw-cell{display:flex;align-items:center;justify-content:center;border-radius:4px;position:relative;}
.cw-cell.black{background:#2D3748;}
.cw-cell.white{background:var(--g7);border:2px solid var(--border);cursor:pointer;transition:all 0.12s;}
.cw-cell.white.active-word{background:#EFF6FF;border-color:#93C5FD;}
.cw-cell.white.active-cell{background:#DBEAFE;border-color:#3B82F6;box-shadow:0 0 0 2px #93C5FD;}
.cw-cell.white.correct{background:var(--g6);border-color:var(--g4);}
.cw-cell.white.gifted{background:#DBEAFE;border-color:#3B82F6;}
.cw-cell.white.wrong-cell{background:#FEE2E2;border-color:#EF4444;}
.cw-cell.white.hint-cell{animation:hintFlash 0.6s ease 3;}
.cw-num{position:absolute;top:1px;left:2px;font-size:7px;font-weight:900;color:var(--muted);line-height:1;}
.cw-letter{font-weight:900;color:var(--g1);}
/* Active clue banner */
.cw-active-banner{flex-shrink:0;background:linear-gradient(135deg,#3B82F6,#6366F1);border-radius:12px;padding:8px 14px;display:none;}
.cw-active-banner.show{display:block;}
.cw-active-num{font-size:11px;font-weight:800;color:rgba(255,255,255,0.8);letter-spacing:0.5px;}
.cw-active-def{font-size:13px;font-weight:700;color:white;line-height:1.4;margin-top:2px;}
.cw-active-lang{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;}
/* Hidden input for keyboard */
.cw-hidden-input{position:fixed;opacity:0;pointer-events:none;top:50%;left:50%;width:1px;height:1px;}
/* Clue list bottom */
.cw-clues-wrap{flex:1;overflow-y:auto;min-height:0;}
.cw-clues-title{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.cw-clue{display:flex;gap:6px;margin-bottom:5px;padding:6px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;transition:all 0.15s;align-items:flex-start;}
.cw-clue.active{border-color:#3B82F6;background:#EFF6FF;}
.cw-clue.solved{border-color:var(--g4);background:var(--g7);opacity:0.7;}
.cw-clue.gifted{border-color:#3B82F6;background:#DBEAFE;opacity:0.7;}
.cw-clue-num{font-size:12px;font-weight:900;color:var(--g2);flex-shrink:0;min-width:22px;}
.cw-clue-text{font-size:12px;font-weight:600;color:var(--text);line-height:1.5;white-space:normal;word-break:break-word;}
.cw-clue-lang{font-size:10px;color:var(--muted);margin-top:1px;}

/* RESULT */
.result-overlay{position:fixed;inset:0;background:rgba(234,247,216,0.96);z-index:150;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.result-overlay.show{display:flex;}
.result-emoji{font-size:60px;margin-bottom:10px;animation:bounce 0.6s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.result-title{font-size:24px;font-weight:900;color:var(--g1);margin-bottom:4px;}
.result-score{font-size:16px;font-weight:700;color:var(--muted);margin-bottom:14px;}
.wrong-box{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;margin-bottom:16px;width:100%;max-width:340px;text-align:left;max-height:160px;overflow-y:auto;}
.wrong-box h4{font-size:12px;font-weight:800;color:var(--danger);margin-bottom:6px;}
.wrong-item{font-size:12px;font-weight:600;color:var(--text);padding:2px 0;border-bottom:1px solid var(--border);}
.wrong-item:last-child{border-bottom:none;}
.result-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;}
.result-btns button{padding:13px;border:none;border-radius:13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.btn-redo{background:var(--amber-bg);color:#92400E;border:1.5px solid var(--amber);}
.btn-next{background:linear-gradient(135deg,var(--g2),var(--g3));color:white;box-shadow:0 4px 16px rgba(45,125,45,0.3);}
.btn-stop{background:var(--g7);color:var(--muted);border:1.5px solid var(--border);}

/* CONFETTI */
.confetti-wrap{position:fixed;inset:0;z-index:200;pointer-events:none;}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;border-radius:2px;animation:confettiFall var(--dur) var(--delay) ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(234,247,216,0.92);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.overlay.show{display:flex;}
.spinner{width:44px;height:44px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--g2);animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.overlay-text{font-size:15px;font-weight:800;color:var(--g1);}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-backdrop.show{display:flex;}
.modal{background:var(--white);border-radius:var(--radius);padding:22px;width:100%;max-width:340px;}
.modal h3{font-size:17px;font-weight:900;color:var(--g1);margin-bottom:14px;}
.modal input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:18px;font-weight:800;letter-spacing:4px;text-align:center;outline:none;margin-bottom:10px;font-family:'Nunito',sans-serif;}
.modal input:focus{border-color:var(--g3);}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;padding:11px;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.modal-btns .confirm{background:linear-gradient(135deg,var(--g2),var(--g3));color:white;}
.modal-btns .cancel{background:var(--g7);color:var(--muted);border:1.5px solid var(--border);}
.modal .err{font-size:12px;color:var(--danger);margin-bottom:8px;display:none;}
.modal .err.show{display:block;}
</style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob1"></div><div class="blob blob2"></div></div>
<div class="idle-effect" id="idleEffect"></div>
<div class="idle-msg" id="idleMsg">😴 Still there? Come on, you can do it! 💪</div>
<div class="confetti-wrap" id="confettiWrap"></div>
<div class="overlay" id="overlay"><div class="spinner"></div><div class="overlay-text" id="overlayText">Setting up Word Hunt...</div></div>
<div class="modal-backdrop" id="exitModal">
  <div class="modal">
    <h3>🔐 Teacher PIN to exit</h3>
    <div class="err" id="exitErr">Wrong PIN.</div>
    <input type="password" id="exitPin" placeholder="••••••" maxlength="10" onkeydown="if(event.key==='Enter')confirmExit()">
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal('exitModal')">Cancel</button>
      <button class="confirm" onclick="confirmExit()">Exit</button>
    </div>
  </div>
</div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div class="result-title" id="resultTitle">Well done!</div>
  <div class="result-score" id="resultScore"></div>
  <div class="wrong-box" id="wrongBox" style="display:none"><h4>❌ Words to review:</h4><div id="wrongList"></div></div>
  <div class="result-btns" id="resultBtns"></div>
</div>

<div class="topbar">
  <img src="ZPS_header_75pc.jpg" alt="ZPS" class="logo-img" onerror="this.style.display='none'">
  <div class="session-code" id="sessionCode">—</div>
</div>

<div class="main">
  <div class="info-bar">
    <div class="badge-pill">🔍 Word Hunt</div>
    <div class="score-display" id="scoreDisplay">0/12</div>
    <button class="exit-btn" onclick="openModal('exitModal')">Exit 🔐</button>
  </div>
  <div class="hint-bar">
    <div class="hint-label">💡 Hints</div>
    <div class="hint-dots" id="hintDots"></div>
    <button class="hint-btn" id="hintBtn" onclick="useHint()">Hint!</button>
  </div>
  <div class="puzzle-label" id="puzzleLabel">—</div>
  <div id="puzzleArea" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;"></div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbw76QSB-lv4pA-6s_m6vNk_oGEdeLqrsqkoBGu6j-XMulb-maiAGkqqhfqqEmGfcbn3Ow/exec';
const LANG_LABELS={zh:'中文',ms:'Malay',id:'Indonesia',vi:'Việt',th:'ไทย',my:'မြန်မာ',km:'ខ្មែរ',bn:'বাংলা'};
const LANG_KEY={zh:'translation_zh',ms:'translation_ms',id:'translation_id',vi:'translation_vi',th:'translation_th',my:'translation_my',km:'translation_km',bn:'translation_bn'};
const MAX_HINTS=5, TOTAL=12, PASS=11;

let config={},setup={},student={},recordId='';
let words=[],puzzleWords=[];
let puzzleType='wordsearch';
let foundWords=new Set(),wrongWords=[];
let hintsLeft=MAX_HINTS;
let selectedLang=null;
let idleTimer=null, lastActivity=Date.now();
let giftedWordId=null; // the one pre-revealed word

// Word search state
let wsGrid=[],wsSize=0,wsWordPlacements=[];
let wsDragging=false,wsStart=null,wsSelected=[];

// Crossword state
let cwGrid=[],cwClues=[],cwActive=null;

// ============================================================
// AUDIO ENGINE (Web Audio API)
// ============================================================
let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playTone(freq,dur,type='square',vol=0.15,delay=0){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type; osc.frequency.value=freq;
    gain.gain.setValueAtTime(0,ctx.currentTime+delay);
    gain.gain.linearRampToValueAtTime(vol,ctx.currentTime+delay+0.01);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+delay+dur);
    osc.start(ctx.currentTime+delay);
    osc.stop(ctx.currentTime+delay+dur+0.05);
  }catch(e){}
}

function playCorrect(){
  playTone(523,0.1,'square',0.15,0);
  playTone(659,0.1,'square',0.15,0.1);
  playTone(784,0.2,'square',0.15,0.2);
}

function playWrong(){
  playTone(200,0.15,'sawtooth',0.12,0);
  playTone(150,0.2,'sawtooth',0.12,0.15);
}

function playHint(){
  playTone(440,0.08,'sine',0.1,0);
  playTone(550,0.08,'sine',0.1,0.1);
}

function playWin(){
  const melody=[523,587,659,698,784,880,988,1047];
  melody.forEach((f,i)=>playTone(f,0.15,'square',0.15,i*0.1));
  setTimeout(()=>{
    [1047,988,880,784].forEach((f,i)=>playTone(f,0.12,'square',0.12,i*0.08));
  },900);
}

let bgMusicInterval=null;
function startBgMusic(){
  const pattern=[
    [330,0.08],[370,0.08],[415,0.08],[440,0.16],
    [392,0.08],[370,0.08],[330,0.16],[0,0.08],
    [294,0.08],[330,0.08],[370,0.08],[392,0.16],
    [370,0.08],[330,0.08],[294,0.16],[0,0.16],
  ];
  let i=0,t=0;
  function scheduleNext(){
    const [freq,dur]=pattern[i%pattern.length];
    if(freq>0) playTone(freq,dur,'sine',0.06,t);
    t+=dur+0.02;
    i++;
    if(t>2){t=0;}
    bgMusicInterval=setTimeout(scheduleNext,dur*1000+20);
  }
  scheduleNext();
}
function stopBgMusic(){if(bgMusicInterval){clearTimeout(bgMusicInterval);bgMusicInterval=null;}}

// ============================================================
// INIT
// ============================================================
async function api(p){const q=new URLSearchParams(p).toString();const r=await fetch(API+'?'+q);return r.json();}
function showLoading(t){document.getElementById('overlayText').textContent=t||'...';document.getElementById('overlay').classList.add('show');}
function hideLoading(){document.getElementById('overlay').classList.remove('show');}
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

(async function(){
  showLoading('Setting up Word Hunt...');
  student=JSON.parse(sessionStorage.getItem('ds_student')||'{}');
  setup=JSON.parse(sessionStorage.getItem('ds_setup')||'{}');
  config=JSON.parse(sessionStorage.getItem('ds_config')||'{}');
  recordId=sessionStorage.getItem('ds_record_id')||'';
  document.getElementById('sessionCode').textContent=recordId||'—';
  if(!student.name||!setup.series){window.location.href='index.html';return;}

  // Try sessionStorage first (fast), fallback to API
  const cachedWords = sessionStorage.getItem('ds_words');
  if(cachedWords){
    try{ words=JSON.parse(cachedWords); }catch(e){ words=[]; }
  }
  if(!words.length){
    try{
      const res=await api({action:'getWords',series:setup.series,level:setup.level,
        unit_from:setup.unit_from,unit_to:setup.unit_to,half:setup.half||'all',mode:'primary'});
      if(!res.success||!res.data.length){alert('No words found.');window.location.href='setup.html';return;}
      words=res.data;
      sessionStorage.setItem('ds_words', JSON.stringify(words));
    }catch(e){alert('Connection error.');return;}
  }

  const eligible=words.filter(w=>w.word&&/^[a-zA-Z\s\-]+$/.test(w.word)&&w.word.replace(/[\s\-]/g,'').length>=3);
  shuffle(eligible);
  puzzleWords=eligible.slice(0,Math.min(TOTAL,eligible.length));

  puzzleType=Math.random()<0.5?'wordsearch':'crossword';
  document.getElementById('puzzleLabel').textContent=
    puzzleType==='wordsearch'?'🔍 Word Search — Find the hidden words!':'✏️ Crossword — Fill in the answers!';

  buildHintDots();
  updateScore();
  startBgMusic();
  startIdleTimer();

  if(puzzleType==='wordsearch') buildWordSearch();
  else buildCrossword();

  hideLoading();
  // Unlock audio on first interaction
  document.addEventListener('touchstart',()=>{try{getAudioCtx().resume();}catch(e){}},{once:true});
})();

// ============================================================
// IDLE TIMER
// ============================================================
function resetIdleTimer(){
  lastActivity=Date.now();
  document.getElementById('idleEffect').classList.remove('show');
  document.getElementById('idleMsg').classList.remove('show');
  if(idleTimer) clearTimeout(idleTimer);
  idleTimer=setTimeout(showIdleEffect,30000);
}
function startIdleTimer(){resetIdleTimer();}

function showIdleEffect(){
  const eff=document.getElementById('idleEffect');
  eff.classList.add('show');
  eff.innerHTML='';
  const emojis=['⏰','💤','😴','🌟','💫','⭐'];
  for(let i=0;i<12;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=Math.random()*90+'%';
    s.style.top=Math.random()*80+'%';
    s.style.animationDelay=(Math.random()*1.5)+'s';
    eff.appendChild(s);
  }
  document.getElementById('idleMsg').classList.add('show');
  setTimeout(()=>{
    eff.classList.remove('show');
    document.getElementById('idleMsg').classList.remove('show');
    idleTimer=setTimeout(showIdleEffect,30000);
  },4000);
}

// HINT SYSTEM
// ============================================================
function buildHintDots(){
  const dots=document.getElementById('hintDots');
  dots.innerHTML='';
  for(let i=0;i<MAX_HINTS;i++){
    const d=document.createElement('div');
    d.className='hint-dot'+(i>=hintsLeft?' used':'');
    dots.appendChild(d);
  }
  document.getElementById('hintBtn').disabled=hintsLeft===0;
}

function useHint(){
  if(hintsLeft<=0) return;
  hintsLeft--;
  buildHintDots();
  playHint();
  resetIdleTimer();

  if(hintsLeft===0){
    // No hints left — rebuild puzzle
    setTimeout(()=>{
      alert('No more hints! Starting over... but keeping your gift word! 🎁');
      foundWords.clear(); wrongWords=[];
      if(puzzleType==='wordsearch') buildWordSearch(true);
      else buildCrossword(true);
      hintsLeft=MAX_HINTS; buildHintDots();
    },300);
    return;
  }

  if(puzzleType==='wordsearch') hintWordSearch();
  else hintCrossword();
}

function hintWordSearch(){
  // Find first unfound word (not the gifted one)
  const unfound=wsWordPlacements.filter(p=>!foundWords.has(p.word.clean));
  if(!unfound.length) return;
  const target=unfound[0];
  // Flash a random unrevealed letter in that word
  const revealed=target.cells.filter(([r,c])=>{
    const el=document.querySelector(`.ws-cell[data-r="${r}"][data-c="${c}"]`);
    return el&&!el.classList.contains('hint-flash');
  });
  const pick=revealed.length? revealed[Math.floor(Math.random()*revealed.length)] : target.cells[0];
  const el=document.querySelector(`.ws-cell[data-r="${pick[0]}"][data-c="${pick[1]}"]`);
  if(el){el.classList.add('hint-flash');setTimeout(()=>el.classList.remove('hint-flash'),2000);}
}

function hintCrossword(){
  if(!cwActive) return;
  const cl=cwActive;
  // Find first empty cell in active word
  for(let i=0;i<cl.word.clean.length;i++){
    const nr=cl.row+(cl.dir==='V'?i:0);
    const nc=cl.col+(cl.dir==='H'?i:0);
    if(cwGrid[nr]?.[nc]&&!cwGrid[nr][nc].userLetter){
      cwGrid[nr][nc].userLetter=cl.word.clean[i];
      const el=document.getElementById(`cwl_${nr}_${nc}`);
      if(el){el.textContent=cl.word.clean[i];el.parentElement.classList.add('hint-cell');
        setTimeout(()=>el.parentElement.classList.remove('hint-cell'),2000);}
      return;
    }
  }
}

// ============================================================
// WORD SEARCH
// ============================================================
function buildWordSearch(keepGift=false){
  const cleanWords=puzzleWords.map(w=>({...w,clean:w.word.toUpperCase().replace(/[\s\-]/g,'')}));
  wsSize=Math.min(18,Math.max(14,Math.ceil(Math.sqrt(cleanWords.reduce((s,w)=>s+w.clean.length,0)*2.5))));
  wsGrid=Array.from({length:wsSize},()=>Array(wsSize).fill(''));
  wsWordPlacements=[];

  const DIRS=[[0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]];
  for(const w of cleanWords){
    let placed=false;
    for(let a=0;a<300&&!placed;a++){
      const dir=DIRS[Math.floor(Math.random()*DIRS.length)];
      const dr=dir[0],dc=dir[1];
      const mR=wsSize-Math.max(0,dr*(w.clean.length-1));
      const mC=wsSize-Math.max(0,dc*(w.clean.length-1));
      const r=Math.floor(Math.random()*Math.max(1,mR));
      const c=Math.floor(Math.random()*Math.max(1,mC));
      let ok=true; const cells=[];
      for(let i=0;i<w.clean.length;i++){
        const nr=r+dr*i,nc=c+dc*i;
        if(nr<0||nr>=wsSize||nc<0||nc>=wsSize){ok=false;break;}
        if(wsGrid[nr][nc]!==''&&wsGrid[nr][nc]!==w.clean[i]){ok=false;break;}
        cells.push([nr,nc]);
      }
      if(ok){cells.forEach(([nr,nc],i)=>wsGrid[nr][nc]=w.clean[i]);wsWordPlacements.push({word:w,cells});placed=true;}
    }
  }
  const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<wsSize;r++)for(let c=0;c<wsSize;c++)if(!wsGrid[r][c])wsGrid[r][c]=alpha[Math.floor(Math.random()*26)];

  // Gift one word (random, or keep previous if keepGift)
  if(!keepGift||!giftedWordId){
    const pick=wsWordPlacements[Math.floor(Math.random()*wsWordPlacements.length)];
    giftedWordId=pick?.word.word_id;
  }
  // Auto-mark gifted word as found
  const giftedPlacement=wsWordPlacements.find(p=>p.word.word_id===giftedWordId);
  if(giftedPlacement) foundWords.add(giftedPlacement.word.clean);

  renderWordSearch();
}

function renderWordSearch(){
  const area=document.getElementById('puzzleArea');
  area.innerHTML=''; area.className='ws-container';
  const gridWrap=document.createElement('div');gridWrap.className='ws-grid-wrap';
  const grid=document.createElement('div');grid.className='ws-grid';
  const avW=Math.min(window.innerWidth-24,420);
  const avH=window.innerHeight*0.5;
  const cs=Math.floor(Math.min(avW/wsSize,avH/wsSize))-2;
  grid.style.gridTemplateColumns=`repeat(${wsSize},${cs}px)`;

  for(let r=0;r<wsSize;r++)for(let c=0;c<wsSize;c++){
    const cell=document.createElement('div');
    cell.className='ws-cell'; cell.style.width=cs+'px';cell.style.height=cs+'px';
    cell.style.fontSize=Math.max(9,cs-6)+'px'; cell.textContent=wsGrid[r][c];
    cell.dataset.r=r;cell.dataset.c=c;
    // Check if this cell belongs to gifted word
    const gp=wsWordPlacements.find(p=>p.word.word_id===giftedWordId);
    if(gp&&gp.cells.some(([gr,gc])=>gr===r&&gc===c)) cell.classList.add('gifted');
    else if(foundWords.has(wsGrid[r][c])&&wsWordPlacements.some(p=>foundWords.has(p.word.clean)&&p.cells.some(([pr,pc])=>pr===r&&pc===c))) cell.classList.add('found');
    grid.appendChild(cell);
  }

  // Properly mark found cells
  wsWordPlacements.forEach(p=>{
    if(foundWords.has(p.word.clean)){
      p.cells.forEach(([r,c])=>{
        const el=document.querySelector(`.ws-cell[data-r="${r}"][data-c="${c}"]`);
        if(el){
          if(p.word.word_id===giftedWordId) el.classList.add('gifted');
          else el.classList.add('found');
        }
      });
    }
  });

  // Touch/mouse drag
  let touchId=null;
  grid.addEventListener('mousedown',e=>{
    resetIdleTimer();
    const cell=e.target.closest('.ws-cell');if(!cell)return;
    wsDragging=true;wsStart=[+cell.dataset.r,+cell.dataset.c];wsSelected=[[+cell.dataset.r,+cell.dataset.c]];
    highlightWS();
  });
  grid.addEventListener('mousemove',e=>{
    if(!wsDragging)return;
    const cell=e.target.closest('.ws-cell');if(!cell)return;
    updateWSSelection(+cell.dataset.r,+cell.dataset.c);
  });
  grid.addEventListener('mouseup',()=>{if(wsDragging){wsDragging=false;checkWSSelection();}});
  grid.addEventListener('touchstart',e=>{
    resetIdleTimer();
    const t=e.touches[0];touchId=t.identifier;
    const cell=document.elementFromPoint(t.clientX,t.clientY)?.closest('.ws-cell');if(!cell)return;
    wsDragging=true;wsStart=[+cell.dataset.r,+cell.dataset.c];wsSelected=[[+cell.dataset.r,+cell.dataset.c]];
    highlightWS();e.preventDefault();
  },{passive:false});
  grid.addEventListener('touchmove',e=>{
    if(!wsDragging)return;
    const t=Array.from(e.touches).find(x=>x.identifier===touchId);if(!t)return;
    const cell=document.elementFromPoint(t.clientX,t.clientY)?.closest('.ws-cell');if(!cell)return;
    updateWSSelection(+cell.dataset.r,+cell.dataset.c);e.preventDefault();
  },{passive:false});
  grid.addEventListener('touchend',()=>{if(wsDragging){wsDragging=false;checkWSSelection();}});

  gridWrap.appendChild(grid);area.appendChild(gridWrap);

  // Word chips
  const chipWrap=document.createElement('div');chipWrap.className='ws-wordlist';
  puzzleWords.forEach(w=>{
    const clean=w.word.toUpperCase().replace(/[\s\-]/g,'');
    const chip=document.createElement('div');
    chip.id='chip_'+w.word_id;
    const isGifted=w.word_id===giftedWordId;
    const isFound=foundWords.has(clean);
    chip.className='ws-word-chip'+(isGifted?' gifted':isFound?' found':'');
    chip.textContent=w.word;
    chipWrap.appendChild(chip);
  });
  area.appendChild(chipWrap);
  updateScore();
}

function updateWSSelection(r,c){
  if(!wsStart)return;
  const[sr,sc]=wsStart,dr=r-sr,dc=c-sc;
  const len=Math.max(Math.abs(dr),Math.abs(dc));
  if(len===0){wsSelected=[[sr,sc]];highlightWS();return;}
  let stepR=0,stepC=0;
  if(Math.abs(dr)===Math.abs(dc)){stepR=dr/len;stepC=dc/len;}
  else if(Math.abs(dr)>Math.abs(dc)){stepR=dr/Math.abs(dr);}
  else{stepC=dc/Math.abs(dc);}
  wsSelected=[];
  for(let i=0;i<=len&&i<wsSize*2;i++)wsSelected.push([sr+Math.round(stepR*i),sc+Math.round(stepC*i)]);
  highlightWS();
}

function highlightWS(){
  document.querySelectorAll('.ws-cell:not(.found):not(.gifted)').forEach(c=>c.classList.remove('selected'));
  wsSelected.forEach(([r,c])=>{
    const el=document.querySelector(`.ws-cell[data-r="${r}"][data-c="${c}"]`);
    if(el&&!el.classList.contains('found')&&!el.classList.contains('gifted'))el.classList.add('selected');
  });
}

function checkWSSelection(){
  const sel=wsSelected.map(([r,c])=>wsGrid[r][c]).join('');
  const rev=[...wsSelected].reverse().map(([r,c])=>wsGrid[r][c]).join('');
  for(const p of wsWordPlacements){
    if((sel===p.word.clean||rev===p.word.clean)&&!foundWords.has(p.word.clean)){
      foundWords.add(p.word.clean);
      p.cells.forEach(([r,c])=>{
        const el=document.querySelector(`.ws-cell[data-r="${r}"][data-c="${c}"]`);
        if(el){el.classList.remove('selected');el.classList.add('found');}
      });
      const chip=document.getElementById('chip_'+p.word.word_id);
      if(chip){chip.classList.remove('gifted');chip.classList.add('found');}
      playCorrect();
      updateScore();
      resetIdleTimer();
      if(foundWords.size===puzzleWords.length)setTimeout(showResult,600);
      wsSelected=[];wsStart=null;return;
    }
  }
  document.querySelectorAll('.ws-cell.selected').forEach(c=>c.classList.remove('selected'));
  wsSelected=[];wsStart=null;
}

// ============================================================
// CROSSWORD
// ============================================================
function buildCrossword(keepGift=false){
  const cleanWords=puzzleWords.map(w=>({...w,clean:w.word.toUpperCase().replace(/[\s\-]/g,'')}))
    .filter(w=>w.clean.length>=3).sort((a,b)=>b.clean.length-a.clean.length);
  const SZ=20;
  cwGrid=Array.from({length:SZ},()=>Array(SZ).fill(null));
  cwClues=[];let clueNum=1;

  // Place first word
  const fw=cleanWords[0];
  const sc=Math.floor((SZ-fw.clean.length)/2),sr=Math.floor(SZ/2);
  placeCW(fw,sr,sc,'H',clueNum++,SZ);

  for(let wi=1;wi<cleanWords.length;wi++){
    const w=cleanWords[wi];let placed=false;
    for(const pc of [...cwClues]){
      if(placed)break;
      for(let pi=0;pi<pc.word.clean.length&&!placed;pi++){
        for(let wi2=0;wi2<w.clean.length&&!placed;wi2++){
          if(pc.word.clean[pi]===w.clean[wi2]){
            const nd=pc.dir==='H'?'V':'H';
            const nr=nd==='V'?pc.row-wi2:pc.row+pi;
            const nc=nd==='H'?pc.col-wi2:pc.col+pi;
            if(canCW(w.clean,nr,nc,nd,SZ)){placeCW(w,nr,nc,nd,clueNum++,SZ);placed=true;}
          }
        }
      }
    }
    if(!placed){
      for(let a=0;a<80&&!placed;a++){
        const d=Math.random()<0.5?'H':'V';
        const r=1+Math.floor(Math.random()*(SZ-2));
        const c=1+Math.floor(Math.random()*(SZ-2));
        if(canCW(w.clean,r,c,d,SZ)){placeCW(w,r,c,d,clueNum++,SZ);placed=true;}
      }
    }
  }

  // Trim
  let minR=SZ,maxR=0,minC=SZ,maxC=0;
  cwClues.forEach(cl=>{
    minR=Math.min(minR,cl.row);maxR=Math.max(maxR,cl.row+(cl.dir==='V'?cl.word.clean.length-1:0));
    minC=Math.min(minC,cl.col);maxC=Math.max(maxC,cl.col+(cl.dir==='H'?cl.word.clean.length-1:0));
  });
  minR=Math.max(0,minR-1);minC=Math.max(0,minC-1);
  maxR=Math.min(SZ-1,maxR+1);maxC=Math.min(SZ-1,maxC+1);
  const tH=maxR-minR+1,tW=maxC-minC+1;
  cwGrid=Array.from({length:tH},(_,r)=>Array.from({length:tW},(_,c)=>cwGrid[minR+r]?.[minC+c]||null));
  cwClues.forEach(cl=>{cl.row-=minR;cl.col-=minC;});

  // Gift one clue
  if(!keepGift||!giftedWordId){
    const pick=cwClues[Math.floor(Math.random()*cwClues.length)];
    giftedWordId=pick?.word.word_id;
  }
  const giftClue=cwClues.find(cl=>cl.word.word_id===giftedWordId);
  if(giftClue){
    giftClue.solved=true;giftClue.gifted=true;
    foundWords.add(giftClue.word.clean);
    for(let i=0;i<giftClue.word.clean.length;i++){
      const nr=giftClue.row+(giftClue.dir==='V'?i:0);
      const nc=giftClue.col+(giftClue.dir==='H'?i:0);
      if(cwGrid[nr]?.[nc])cwGrid[nr][nc].userLetter=giftClue.word.clean[i];
    }
  }

  renderCrossword();
}

function canCW(word,r,c,dir,SZ){
  for(let i=0;i<word.length;i++){
    const nr=r+(dir==='V'?i:0),nc=c+(dir==='H'?i:0);
    if(nr<0||nr>=SZ||nc<0||nc>=SZ)return false;
    const cell=cwGrid[nr]?.[nc];
    if(cell&&cell.letter&&cell.letter!==word[i])return false;
  }
  return true;
}

function placeCW(wordObj,r,c,dir,num,SZ){
  for(let i=0;i<wordObj.clean.length;i++){
    const nr=r+(dir==='V'?i:0),nc=c+(dir==='H'?i:0);
    if(!cwGrid[nr])cwGrid[nr]=Array(SZ).fill(null);
    if(!cwGrid[nr][nc])cwGrid[nr][nc]={letter:wordObj.clean[i],num:null,white:true,userLetter:''};
    else{cwGrid[nr][nc].letter=wordObj.clean[i];cwGrid[nr][nc].white=true;}
  }
  if(cwGrid[r][c])cwGrid[r][c].num=num;
  cwClues.push({num,word:wordObj,row:r,col:c,dir,solved:false,gifted:false});
}

function renderCrossword(){
  const area=document.getElementById('puzzleArea');
  area.innerHTML=''; area.className='cw-container';
  // Remove old hidden input if any
  document.getElementById('cwHiddenInput')?.remove();

  const hiddenInp=document.createElement('input');
  hiddenInp.className='cw-hidden-input'; hiddenInp.id='cwHiddenInput';
  hiddenInp.setAttribute('autocomplete','off');
  hiddenInp.setAttribute('autocorrect','off');
  hiddenInp.setAttribute('autocapitalize','characters');
  hiddenInp.addEventListener('keydown',onCWKeydown);
  document.body.appendChild(hiddenInp);

  const gridWrap=document.createElement('div'); gridWrap.className='cw-grid-wrap';
  const grid=document.createElement('div'); grid.className='cw-grid';
  const rows=cwGrid.length, cols=cwGrid[0]?.length||1;
  const avW=Math.min(window.innerWidth-24, window.innerHeight*0.42);
  const cs=Math.max(18, Math.floor(Math.min(avW/cols, avW/rows, 28)));
  grid.style.gridTemplateColumns=`repeat(${cols},${cs}px)`;

  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const cell=document.createElement('div');
    const cd=cwGrid[r]?.[c];
    cell.className='cw-cell '+(cd?.white?'white':'black');
    cell.style.width=cs+'px'; cell.style.height=cs+'px';
    if(cd?.white){
      if(cd.num){const n=document.createElement('span');n.className='cw-num';n.textContent=cd.num;cell.appendChild(n);}
      const l=document.createElement('span');l.className='cw-letter';l.id=`cwl_${r}_${c}`;
      l.style.fontSize=Math.max(10,cs-8)+'px';
      l.textContent=cd.userLetter||'';
      cell.appendChild(l);
      cell.dataset.r=r; cell.dataset.c=c;
      const cluesForCell=cwClues.filter(cl=>{
        if(cl.dir==='H')return cl.row===r&&c>=cl.col&&c<cl.col+cl.word.clean.length;
        return cl.col===c&&r>=cl.row&&r<cl.row+cl.word.clean.length;
      });
      const anyGifted=cluesForCell.some(cl=>cl.gifted);
      const anySolved=cluesForCell.some(cl=>cl.solved&&!cl.gifted);
      if(anyGifted) cell.classList.add('gifted');
      else if(anySolved) cell.classList.add('correct');
      else if(cwActive){
        if(cluesForCell.includes(cwActive)){
          cell.classList.add('active-word');
          const pos=cwActive.dir==='H'?c-cwActive.col:r-cwActive.row;
          if(pos===cwCursor) cell.classList.add('active-cell');
        }
      }
      cell.onclick=()=>onCWCellClick(r,c);
    }
    grid.appendChild(cell);
  }
  gridWrap.appendChild(grid); area.appendChild(gridWrap);

  // Active clue banner
  const banner=document.createElement('div'); banner.className='cw-active-banner'+(cwActive?' show':''); banner.id='cwBanner';
  const bannerNum=document.createElement('div'); bannerNum.className='cw-active-num'; bannerNum.id='cwBannerNum';
  const bannerDef=document.createElement('div'); bannerDef.className='cw-active-def'; bannerDef.id='cwBannerDef';
  const bannerLang=document.createElement('div'); bannerLang.className='cw-active-lang'; bannerLang.id='cwBannerLang';
  banner.appendChild(bannerNum); banner.appendChild(bannerDef); banner.appendChild(bannerLang);
  area.appendChild(banner);
  if(cwActive) updateCWBanner();

  const cluesWrap=document.createElement('div'); cluesWrap.className='cw-clues-wrap';
  renderCrosswordClues(cluesWrap);
  area.appendChild(cluesWrap);
  updateScore();
}

let cwCursor=0;

function updateCWBanner(){
  if(!cwActive) return;
  document.getElementById('cwBanner')?.classList.add('show');
  const num=document.getElementById('cwBannerNum');
  const def=document.getElementById('cwBannerDef');
  const lang=document.getElementById('cwBannerLang');
  if(num) num.textContent=cwActive.num+(cwActive.dir==='H'?' →':' ↓');
  if(def) def.textContent=cwActive.word.definition_en||cwActive.word.word;
  if(lang) lang.textContent=cwActive.word.pos||'';
}

function onCWCellClick(r,c){
  resetIdleTimer();
  const clues=cwClues.filter(cl=>{
    if(cl.solved||cl.gifted) return false;
    if(cl.dir==='H') return cl.row===r&&c>=cl.col&&c<cl.col+cl.word.clean.length;
    return cl.col===c&&r>=cl.row&&r<cl.row+cl.word.clean.length;
  });
  if(!clues.length) return;
  if(cwActive&&clues.includes(cwActive)&&clues.length>1){
    cwActive=clues[(clues.indexOf(cwActive)+1)%clues.length];
  } else { cwActive=clues[0]; }
  cwCursor=cwActive.dir==='H'?c-cwActive.col:r-cwActive.row;
  renderCrossword();
  setTimeout(()=>{const inp=document.getElementById('cwHiddenInput');if(inp){inp.value='';inp.focus();}},50);
}

function onCWKeydown(e){
  if(!cwActive) return;
  resetIdleTimer();
  const key=e.key.toUpperCase();
  if(e.key==='Backspace'){
    e.preventDefault();
    const nr=cwActive.row+(cwActive.dir==='V'?cwCursor:0);
    const nc=cwActive.col+(cwActive.dir==='H'?cwCursor:0);
    if(cwGrid[nr]?.[nc]?.userLetter){
      cwGrid[nr][nc].userLetter='';
      const el=document.getElementById(`cwl_${nr}_${nc}`);
      if(el){el.textContent='';el.parentElement.classList.remove('wrong-cell');}
    } else if(cwCursor>0){
      cwCursor--;
      const pr=cwActive.row+(cwActive.dir==='V'?cwCursor:0);
      const pc=cwActive.col+(cwActive.dir==='H'?cwCursor:0);
      if(cwGrid[pr]?.[pc]) cwGrid[pr][pc].userLetter='';
      const el=document.getElementById(`cwl_${pr}_${pc}`);
      if(el){el.textContent='';el.parentElement.classList.remove('wrong-cell');}
    }
    updateCellHighlight(); return;
  }
  if(e.key==='Escape'){e.preventDefault();cwActive=null;cwCursor=0;renderCrossword();return;}
  if(e.key==='Enter'){e.preventDefault();submitCWWord();return;}
  if(!/^[A-Za-z]$/.test(e.key)) return;
  e.preventDefault();
  const nr=cwActive.row+(cwActive.dir==='V'?cwCursor:0);
  const nc=cwActive.col+(cwActive.dir==='H'?cwCursor:0);
  if(nr<0||nr>=cwGrid.length||nc<0||nc>=(cwGrid[0]?.length||0)) return;
  if(!cwGrid[nr]?.[nc]?.white) return;
  cwGrid[nr][nc].userLetter=key;
  const el=document.getElementById(`cwl_${nr}_${nc}`);
  if(el){el.textContent=key;el.parentElement.classList.remove('wrong-cell');}
  if(cwCursor<cwActive.word.clean.length-1){
    cwCursor++;
  } else {
    submitCWWord(); return;
  }
  updateCellHighlight();
  document.getElementById('cwHiddenInput')?.focus();
}

function updateCellHighlight(){
  if(!cwActive) return;
  for(let i=0;i<cwActive.word.clean.length;i++){
    const nr=cwActive.row+(cwActive.dir==='V'?i:0);
    const nc=cwActive.col+(cwActive.dir==='H'?i:0);
    const el=document.getElementById(`cwl_${nr}_${nc}`)?.parentElement;
    if(el&&!el.classList.contains('correct')&&!el.classList.contains('gifted')){
      el.classList.remove('active-cell');
      el.classList.add('active-word');
    }
  }
  const cr=cwActive.row+(cwActive.dir==='V'?cwCursor:0);
  const cc=cwActive.col+(cwActive.dir==='H'?cwCursor:0);
  const cel=document.getElementById(`cwl_${cr}_${cc}`)?.parentElement;
  if(cel) cel.classList.add('active-cell');
}

function submitCWWord(){
  if(!cwActive) return;
  let userAnswer='';
  for(let i=0;i<cwActive.word.clean.length;i++){
    const nr=cwActive.row+(cwActive.dir==='V'?i:0);
    const nc=cwActive.col+(cwActive.dir==='H'?i:0);
    userAnswer+=(cwGrid[nr]?.[nc]?.userLetter||'');
  }
  if(userAnswer.length<cwActive.word.clean.length) return;
  if(userAnswer===cwActive.word.clean){
    cwActive.solved=true; foundWords.add(cwActive.word.clean);
    for(let i=0;i<cwActive.word.clean.length;i++){
      const nr=cwActive.row+(cwActive.dir==='V'?i:0);
      const nc=cwActive.col+(cwActive.dir==='H'?i:0);
      const el=document.getElementById(`cwl_${nr}_${nc}`);
      if(el){el.parentElement.classList.remove('active-word','active-cell','wrong-cell');el.parentElement.classList.add('correct');}
    }
    playCorrect(); updateScore();
    cwActive=null; cwCursor=0;
    renderCrossword();
    if(foundWords.size===puzzleWords.length) setTimeout(showResult,600);
  } else {
    playWrong();
    for(let i=0;i<cwActive.word.clean.length;i++){
      const nr=cwActive.row+(cwActive.dir==='V'?i:0);
      const nc=cwActive.col+(cwActive.dir==='H'?i:0);
      if(cwGrid[nr]?.[nc]?.userLetter&&cwGrid[nr][nc].userLetter!==cwActive.word.clean[i]){
        cwGrid[nr][nc].userLetter='';
        const el=document.getElementById(`cwl_${nr}_${nc}`);
        if(el){el.textContent='';el.parentElement.classList.add('wrong-cell');
          setTimeout(()=>el.parentElement.classList.remove('wrong-cell'),1000);}
      }
    }
    if(!wrongWords.find(w=>w.word_id===cwActive.word.word_id)) wrongWords.push(cwActive.word);
    cwCursor=0; updateCellHighlight();
    document.getElementById('cwHiddenInput')?.focus();
  }
}

function hintWordSearch(){

  if(!unfound.length) return;

    const el=document.querySelector(`.ws-cell[data-r="${r}"][data-c="${c}"]`);

function hintCrossword(){

function buildWordSearch(keepGift=false){
  const cleanWords=puzzleWords.map(w=>({...w,clean:w.word.toUpperCase().replace(/[\s\-]/g,'')}));
  wsSize=Math.min(18,Math.max(14,Math.ceil(Math.sqrt(cleanWords.reduce((s,w)=>s+w.clean.length,0)*2.5))));
  wsGrid=Array.from({length:wsSize},()=>Array(wsSize).fill(''));
  wsWordPlacements=[];

  const DIRS=[[0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]];
  for(const w of cleanWords){
    let placed=false;
    for(let a=0;a<300&&!placed;a++){
      const dir=DIRS[Math.floor(Math.random()*DIRS.length)];
      const dr=dir[0],dc=dir[1];
      const mR=wsSize-Math.max(0,dr*(w.clean.length-1));
      const mC=wsSize-Math.max(0,dc*(w.clean.length-1));
      const r=Math.floor(Math.random()*Math.max(1,mR));
      const c=Math.floor(Math.random()*Math.max(1,mC));
      let ok=true; const cells=[];
      for(let i=0;i<w.clean.length;i++){
        const nr=r+dr*i,nc=c+dc*i;
        if(nr<0||nr>=wsSize||nc<0||nc>=wsSize){ok=false;break;}
        if(wsGrid[nr][nc]!==''&&wsGrid[nr][nc]!==w.clean[i]){ok=false;break;}
        cells.push([nr,nc]);
      }
      if(ok){cells.forEach(([nr,nc],i)=>wsGrid[nr][nc]=w.clean[i]);wsWordPlacements.push({word:w,cells});placed=true;}
    }
  }
  const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<wsSize;r++)for(let c=0;c<wsSize;c++)if(!wsGrid[r][c])wsGrid[r][c]=alpha[Math.floor(Math.random()*26)];

  // Gift one word (random, or keep previous if keepGift)
  if(!keepGift||!giftedWordId){
    const pick=wsWordPlacements[Math.floor(Math.random()*wsWordPlacements.length)];
    giftedWordId=pick?.word.word_id;
  }
  // Auto-mark gifted word as found
  const giftedPlacement=wsWordPlacements.find(p=>p.word.word_id===giftedWordId);
  if(giftedPlacement) foundWords.add(giftedPlacement.word.clean);

  renderWordSearch();
}

function renderWordSearch(){
  const area=document.getElementById('puzzleArea');
  area.innerHTML=''; area.className='ws-container';
  const gridWrap=document.createElement('div');gridWrap.className='ws-grid-wrap';
  const grid=document.createElement('div');grid.className='ws-grid';
  const avW=Math.min(window.innerWidth-24,420);
  const avH=window.innerHeight*0.5;
  const cs=Math.floor(Math.min(avW/wsSize,avH/wsSize))-2;
  grid.style.gridTemplateColumns=`repeat(${wsSize},${cs}px)`;

  for(let r=0;r<wsSize;r++)for(let c=0;c<wsSize;c++){
    const cell=document.createElement('div');
    cell.className='ws-cell'; cell.style.width=cs+'px';cell.style.height=cs+'px';
    cell.style.fontSize=Math.max(9,cs-6)+'px'; cell.textContent=wsGrid[r][c];
    cell.dataset.r=r;cell.dataset.c=c;
    // Check if this cell belongs to gifted word
    const gp=wsWordPlacements.find(p=>p.word.word_id===giftedWordId);
    if(gp&&gp.cells.some(([gr,gc])=>gr===r&&gc===c)) cell.classList.add('gifted');
    else if(foundWords.has(wsGrid[r][c])&&wsWordPlacements.some(p=>foundWords.has(p.word.clean)&&p.cells.some(([pr,pc])=>pr===r&&pc===c))) cell.classList.add('found');
    grid.appendChild(cell);
  }

  // Properly mark found cells
  wsWordPlacements.forEach(p=>{
    if(foundWords.has(p.word.clean)){
      p.cells.forEach(([r,c])=>{
        const el=document.querySelector(`.ws-cell[data-r="${r}"][data-c="${c}"]`);
        if(el){
          if(p.word.word_id===giftedWordId) el.classList.add('gifted');
          else el.classList.add('found');
        }
      });
    }
  });

  // Touch/mouse drag
  let touchId=null;
  grid.addEventListener('mousedown',e=>{
    resetIdleTimer();
    const cell=e.target.closest('.ws-cell');if(!cell)return;
    wsDragging=true;wsStart=[+cell.dataset.r,+cell.dataset.c];wsSelected=[[+cell.dataset.r,+cell.dataset.c]];
    highlightWS();
  });
  grid.addEventListener('mousemove',e=>{
    if(!wsDragging)return;
    const cell=e.target.closest('.ws-cell');if(!cell)return;
    updateWSSelection(+cell.dataset.r,+cell.dataset.c);
  });
  grid.addEventListener('mouseup',()=>{if(wsDragging){wsDragging=false;checkWSSelection();}});
  grid.addEventListener('touchstart',e=>{
    resetIdleTimer();
    const t=e.touches[0];touchId=t.identifier;
    const cell=document.elementFromPoint(t.clientX,t.clientY)?.closest('.ws-cell');if(!cell)return;
    wsDragging=true;wsStart=[+cell.dataset.r,+cell.dataset.c];wsSelected=[[+cell.dataset.r,+cell.dataset.c]];
    highlightWS();e.preventDefault();
  },{passive:false});
  grid.addEventListener('touchmove',e=>{
    if(!wsDragging)return;
    const t=Array.from(e.touches).find(x=>x.identifier===touchId);if(!t)return;
    const cell=document.elementFromPoint(t.clientX,t.clientY)?.closest('.ws-cell');if(!cell)return;
    updateWSSelection(+cell.dataset.r,+cell.dataset.c);e.preventDefault();
  },{passive:false});
  grid.addEventListener('touchend',()=>{if(wsDragging){wsDragging=false;checkWSSelection();}});

  gridWrap.appendChild(grid);area.appendChild(gridWrap);

  // Word chips
  const chipWrap=document.createElement('div');chipWrap.className='ws-wordlist';
  puzzleWords.forEach(w=>{
    const clean=w.word.toUpperCase().replace(/[\s\-]/g,'');
    const chip=document.createElement('div');
    chip.id='chip_'+w.word_id;
    const isGifted=w.word_id===giftedWordId;
    const isFound=foundWords.has(clean);
    chip.className='ws-word-chip'+(isGifted?' gifted':isFound?' found':'');
    chip.textContent=w.word;
    chipWrap.appendChild(chip);
  });
  area.appendChild(chipWrap);
  updateScore();
}

function updateWSSelection(r,c){
  if(!wsStart)return;
  const[sr,sc]=wsStart,dr=r-sr,dc=c-sc;
  const len=Math.max(Math.abs(dr),Math.abs(dc));
  if(len===0){wsSelected=[[sr,sc]];highlightWS();return;}
  let stepR=0,stepC=0;
  if(Math.abs(dr)===Math.abs(dc)){stepR=dr/len;stepC=dc/len;}
  else if(Math.abs(dr)>Math.abs(dc)){stepR=dr/Math.abs(dr);}
  else{stepC=dc/Math.abs(dc);}
  wsSelected=[];
  for(let i=0;i<=len&&i<wsSize*2;i++)wsSelected.push([sr+Math.round(stepR*i),sc+Math.round(stepC*i)]);
  highlightWS();
}

function highlightWS(){
  document.querySelectorAll('.ws-cell:not(.found):not(.gifted)').forEach(c=>c.classList.remove('selected'));
  wsSelected.forEach(([r,c])=>{
    const el=document.querySelector(`.ws-cell[data-r="${r}"][data-c="${c}"]`);
    if(el&&!el.classList.contains('found')&&!el.classList.contains('gifted'))el.classList.add('selected');
  });
}

function checkWSSelection(){
  const sel=wsSelected.map(([r,c])=>wsGrid[r][c]).join('');
  const rev=[...wsSelected].reverse().map(([r,c])=>wsGrid[r][c]).join('');
  for(const p of wsWordPlacements){
    if((sel===p.word.clean||rev===p.word.clean)&&!foundWords.has(p.word.clean)){
      foundWords.add(p.word.clean);
      p.cells.forEach(([r,c])=>{
        const el=document.querySelector(`.ws-cell[data-r="${r}"][data-c="${c}"]`);
        if(el){el.classList.remove('selected');el.classList.add('found');}
      });
      const chip=document.getElementById('chip_'+p.word.word_id);
      if(chip){chip.classList.remove('gifted');chip.classList.add('found');}
      playCorrect();
      updateScore();
      resetIdleTimer();
      if(foundWords.size===puzzleWords.length)setTimeout(showResult,600);
      wsSelected=[];wsStart=null;return;
    }
  }
  document.querySelectorAll('.ws-cell.selected').forEach(c=>c.classList.remove('selected'));
  wsSelected=[];wsStart=null;
}

// ============================================================
// CROSSWORD
// ============================================================
function buildCrossword(keepGift=false){
  const cleanWords=puzzleWords.map(w=>({...w,clean:w.word.toUpperCase().replace(/[\s\-]/g,'')}))
    .filter(w=>w.clean.length>=3).sort((a,b)=>b.clean.length-a.clean.length);
  const SZ=20;
  cwGrid=Array.from({length:SZ},()=>Array(SZ).fill(null));
  cwClues=[];let clueNum=1;

  // Place first word
  const fw=cleanWords[0];
  const sc=Math.floor((SZ-fw.clean.length)/2),sr=Math.floor(SZ/2);
  placeCW(fw,sr,sc,'H',clueNum++,SZ);

  for(let wi=1;wi<cleanWords.length;wi++){
    const w=cleanWords[wi];let placed=false;
    for(const pc of [...cwClues]){
      if(placed)break;
      for(let pi=0;pi<pc.word.clean.length&&!placed;pi++){
        for(let wi2=0;wi2<w.clean.length&&!placed;wi2++){
          if(pc.word.clean[pi]===w.clean[wi2]){
            const nd=pc.dir==='H'?'V':'H';
            const nr=nd==='V'?pc.row-wi2:pc.row+pi;
            const nc=nd==='H'?pc.col-wi2:pc.col+pi;
            if(canCW(w.clean,nr,nc,nd,SZ)){placeCW(w,nr,nc,nd,clueNum++,SZ);placed=true;}
          }
        }
      }
    }
    if(!placed){
      for(let a=0;a<80&&!placed;a++){
        const d=Math.random()<0.5?'H':'V';
        const r=1+Math.floor(Math.random()*(SZ-2));
        const c=1+Math.floor(Math.random()*(SZ-2));
        if(canCW(w.clean,r,c,d,SZ)){placeCW(w,r,c,d,clueNum++,SZ);placed=true;}
      }
    }
  }

  // Trim
  let minR=SZ,maxR=0,minC=SZ,maxC=0;
  cwClues.forEach(cl=>{
    minR=Math.min(minR,cl.row);maxR=Math.max(maxR,cl.row+(cl.dir==='V'?cl.word.clean.length-1:0));
    minC=Math.min(minC,cl.col);maxC=Math.max(maxC,cl.col+(cl.dir==='H'?cl.word.clean.length-1:0));
  });
  minR=Math.max(0,minR-1);minC=Math.max(0,minC-1);
  maxR=Math.min(SZ-1,maxR+1);maxC=Math.min(SZ-1,maxC+1);
  const tH=maxR-minR+1,tW=maxC-minC+1;
  cwGrid=Array.from({length:tH},(_,r)=>Array.from({length:tW},(_,c)=>cwGrid[minR+r]?.[minC+c]||null));
  cwClues.forEach(cl=>{cl.row-=minR;cl.col-=minC;});

  // Gift one clue
  if(!keepGift||!giftedWordId){
    const pick=cwClues[Math.floor(Math.random()*cwClues.length)];
    giftedWordId=pick?.word.word_id;
  }
  const giftClue=cwClues.find(cl=>cl.word.word_id===giftedWordId);
  if(giftClue){
    giftClue.solved=true;giftClue.gifted=true;
    foundWords.add(giftClue.word.clean);
    for(let i=0;i<giftClue.word.clean.length;i++){
      const nr=giftClue.row+(giftClue.dir==='V'?i:0);
      const nc=giftClue.col+(giftClue.dir==='H'?i:0);
      if(cwGrid[nr]?.[nc])cwGrid[nr][nc].userLetter=giftClue.word.clean[i];
    }
  }

  renderCrossword();
}

function canCW(word,r,c,dir,SZ){
  for(let i=0;i<word.length;i++){
    const nr=r+(dir==='V'?i:0),nc=c+(dir==='H'?i:0);
    if(nr<0||nr>=SZ||nc<0||nc>=SZ)return false;
    const cell=cwGrid[nr]?.[nc];
    if(cell&&cell.letter&&cell.letter!==word[i])return false;
  }
  return true;
}

function placeCW(wordObj,r,c,dir,num,SZ){
  for(let i=0;i<wordObj.clean.length;i++){
    const nr=r+(dir==='V'?i:0),nc=c+(dir==='H'?i:0);
    if(!cwGrid[nr])cwGrid[nr]=Array(SZ).fill(null);
    if(!cwGrid[nr][nc])cwGrid[nr][nc]={letter:wordObj.clean[i],num:null,white:true,userLetter:''};
    else{cwGrid[nr][nc].letter=wordObj.clean[i];cwGrid[nr][nc].white=true;}
  }
  if(cwGrid[r][c])cwGrid[r][c].num=num;
  cwClues.push({num,word:wordObj,row:r,col:c,dir,solved:false,gifted:false});
}

function renderCrossword(){
  const area=document.getElementById('puzzleArea');
  area.innerHTML='';area.className='cw-container';
  const gridSide=document.createElement('div');gridSide.className='cw-grid-side';
  const grid=document.createElement('div');grid.className='cw-grid';
  const rows=cwGrid.length,cols=cwGrid[0]?.length||1;
  const avW=Math.min(window.innerWidth*0.48,200);

    cell.className='cw-cell '+(cd?.white?'white':'black');
    cell.style.width=cs+'px';cell.style.height=cs+'px';

      if(cd.num){const n=document.createElement('span');n.className='cw-num';n.textContent=cd.num;cell.appendChild(n);}

      l.textContent=cd.userLetter||'';cell.appendChild(l);
      cell.dataset.r=r;cell.dataset.c=c;
      // Classes
      const clue=cwClues.find(cl=>{
        if(cl.dir==='H')return cl.row===r&&c>=cl.col&&c<cl.col+cl.word.clean.length;
        return cl.col===c&&r>=cl.row&&r<cl.row+cl.word.clean.length;
      });
      if(clue?.gifted)cell.classList.add('gifted');
      else if(clue?.solved)cell.classList.add('correct');
      else if(clue===cwActive){
        cell.classList.add('active-word');
        const posInWord=cl=>cl.dir==='H'?c-cl.col:r-cl.row;
        if(cwActive&&posInWord(cwActive)>=0)cell.classList.add('active-cell');
      }
      cell.onclick=()=>activateCW(r,c);
    }
    grid.appendChild(cell);
  }
  gridSide.appendChild(grid);area.appendChild(gridSide);

  const cluesSide=document.createElement('div');cluesSide.className='cw-clues-side';
  renderCrosswordClues(cluesSide);area.appendChild(cluesSide);

  // Input
  const inputArea=document.createElement('div');
  inputArea.style.cssText='display:flex;gap:8px;margin-top:6px;flex-shrink:0;';
  inputArea.className='cw-input-area';
  const inp=document.createElement('input');inp.className='cw-input';inp.id='cwInput';
  inp.placeholder='Type answer...';inp.maxLength=20;
  inp.addEventListener('input',()=>{inp.value=inp.value.toUpperCase();resetIdleTimer();});
  inp.onkeydown=e=>{if(e.key==='Enter')checkCW();};
  const sub=document.createElement('button');sub.className='cw-submit';sub.textContent='Check ✓';sub.onclick=checkCW;
  inputArea.appendChild(inp);inputArea.appendChild(sub);
  // Append to main flex column
  document.querySelector('.main').appendChild(inputArea);
  updateScore();
}

function renderCrosswordClues(container){
  const side=container||document.querySelector('.cw-clues-side');if(!side)return;

}

function activateCW(r,c){
  const clue=cwClues.find(cl=>{
    if(cl.solved||cl.gifted)return false;
    if(cl.dir==='H')return cl.row===r&&c>=cl.col&&c<cl.col+cl.word.clean.length;
    return cl.col===c&&r>=cl.row&&r<cl.row+cl.word.clean.length;
  });
  if(clue){cwActive=clue;renderCrossword();document.getElementById('cwInput')?.focus();resetIdleTimer();}
}

function checkCW(){
  const inp=document.getElementById('cwInput');if(!inp||!cwActive)return;
  const answer=inp.value.trim().toUpperCase().replace(/[\s\-]/g,'');
  if(!answer)return;
  resetIdleTimer();
  if(answer===cwActive.word.clean){
    cwActive.solved=true;foundWords.add(cwActive.word.clean);
    for(let i=0;i<cwActive.word.clean.length;i++){
      const nr=cwActive.row+(cwActive.dir==='V'?i:0);
      const nc=cwActive.col+(cwActive.dir==='H'?i:0);
      if(cwGrid[nr]?.[nc])cwGrid[nr][nc].userLetter=cwActive.word.clean[i];
      const el=document.getElementById(`cwl_${nr}_${nc}`);
      if(el){el.textContent=cwActive.word.clean[i];el.parentElement.classList.add('correct');}
    }
    inp.value='';cwActive=null;
    playCorrect();updateScore();renderCrosswordClues();
    if(foundWords.size===puzzleWords.length)setTimeout(showResult,600);
  } else {
    playWrong();
    inp.style.borderColor='var(--danger)';
    setTimeout(()=>inp.style.borderColor='var(--g3)',800);
    if(!wrongWords.find(w=>w.word_id===cwActive.word.word_id))wrongWords.push(cwActive.word);
  }
}

// ============================================================
// RESULT
// ============================================================
function showResult(){
  const total=puzzleWords.length,score=foundWords.size,pass=score>=PASS;
  stopBgMusic();
  if(puzzleType==='wordsearch')
    wrongWords=wsWordPlacements.filter(p=>!foundWords.has(p.word.clean)&&p.word.word_id!==giftedWordId).map(p=>p.word);
  api({action:'updateRecord',record_id:recordId,score:score+'/'+total,
    wrong_words:wrongWords.map(w=>w.word_id).join(','),status:pass?'word_hunt_done':'word_hunt_failed'});

  if(pass){playWin();spawnConfetti();}else playWrong();

  const ov=document.getElementById('resultOverlay');ov.classList.add('show');
  document.getElementById('resultEmoji').textContent=pass?'🎉':'😅';
  document.getElementById('resultTitle').textContent=pass?'Amazing! You passed! 🌟':'So close! Try again!';
  document.getElementById('resultScore').textContent=score+'/'+total+(pass?' ✅':' (need '+PASS+'/'+total+')');

  if(wrongWords.length){
    document.getElementById('wrongBox').style.display='block';
    const list=document.getElementById('wrongList');list.innerHTML='';
    wrongWords.forEach(w=>{const d=document.createElement('div');d.className='wrong-item';d.textContent=w.word+(w.definition_en?' — '+w.definition_en.slice(0,40):'');list.appendChild(d);});
  }

  const btns=document.getElementById('resultBtns');btns.innerHTML='';
  if(!pass){
    const redo=document.createElement('button');redo.className='btn-redo';redo.textContent='Try again 🔄';
    redo.onclick=()=>{ov.classList.remove('show');foundWords.clear();wrongWords=[];hintsLeft=MAX_HINTS;buildHintDots();
      if(puzzleType==='wordsearch')buildWordSearch(true);else{cwActive=null;buildCrossword(true);}startBgMusic();};
    btns.appendChild(redo);
  } else {
    const next=document.createElement('button');next.className='btn-next';next.textContent='Next task ➜';next.onclick=goNext;btns.appendChild(next);
  }
  const stop=document.createElement('button');stop.className='btn-stop';stop.textContent='Stop here';stop.onclick=()=>openModal('exitModal');btns.appendChild(stop);
}

function spawnConfetti(){
  const wrap=document.getElementById('confettiWrap');wrap.innerHTML='';
  const colors=['#4A9A3A','#6AAF45','#F59E0B','#3B82F6','#EC4899','#8B5CF6'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};
      --dur:${1.5+Math.random()*2}s;--delay:${Math.random()*1.5}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.innerHTML='',5000);
}

function goNext(){
  const taskDefs=[null,null,{page:'task3.html'},{page:'task4.html'},{page:'task5.html'}];
  const order=setup.task_order||[0,1,2,3,4];
  const enabled=setup.task_enabled||[true,true,true,true,true];
  const t2pos=order.indexOf(1);
  for(let i=t2pos+1;i<order.length;i++){
    const idx=order[i];
    if(enabled[idx]&&taskDefs[idx]?.page){window.location.href=taskDefs[idx].page;return;}
  }
  window.location.href='index.html';
}

async function confirmExit(){
  const pin=document.getElementById('exitPin').value.trim();if(!pin)return;
  const res=await api({action:'verifyPin',pin});
  if(res.verified){stopBgMusic();await api({action:'updateRecord',record_id:recordId,status:'paused'});window.location.href='index.html';}
  else{document.getElementById('exitErr').classList.add('show');document.getElementById('exitPin').value='';}
}

history.pushState(null,'',location.href);
window.addEventListener('popstate',()=>history.pushState(null,'',location.href));
</script>
